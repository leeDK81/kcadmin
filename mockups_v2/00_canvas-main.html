<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>KC Admin v2 — 연결·테스트·배포</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
:root{--panel-w:480px}
body{overflow:hidden;height:100vh}

/* ── Layout ── */
.layout{height:100vh;overflow:hidden}

/* ── Workspace ── */
.workspace{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Toolbar ── */
.toolbar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;height:48px;z-index:50}
.toolbar-title{font-size:14px;font-weight:700;color:var(--text-primary);white-space:nowrap}
.tb-divider{width:1px;height:22px;background:var(--border);flex-shrink:0}
.focal-chip{display:none;align-items:center;gap:7px;padding:3px 8px 3px 10px;border-radius:6px;font-size:12px;font-weight:700;color:#fff}
.focal-chip.visible{display:inline-flex}
.focal-chip-x{width:18px;height:18px;border-radius:3px;border:none;background:rgba(255,255,255,.25);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:background .15s}
.focal-chip-x:hover{background:rgba(255,255,255,.45)}

/* ── Picker panel ── */
.picker-panel{background:var(--bg-card);border-bottom:2px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;height:204px}
.picker-label-row{padding:8px 16px 0;display:flex;align-items:center;gap:8px;flex-shrink:0}
.picker-label{font-size:11px;font-weight:700;color:var(--text-hint);letter-spacing:.07em;text-transform:uppercase}
.picker-hint{font-size:11px;color:var(--text-hint);margin-left:4px}
.picker-cols{flex:1;display:flex;overflow-x:auto;padding:8px 16px 12px;gap:8px;min-height:0}

.pk-col{min-width:155px;flex:1;display:flex;flex-direction:column;background:var(--bg-page);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.pk-col-hd{padding:7px 10px;display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);background:rgba(0,0,0,.02);flex-shrink:0}
.pk-col-hd i{font-size:9px;opacity:.8}
.pk-count{margin-left:auto;background:rgba(0,0,0,.08);border-radius:8px;padding:1px 6px;font-size:10px;font-weight:700;color:var(--text-secondary)}
.pk-body{flex:1;overflow-y:auto;padding:4px}
.pk-card{display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:5px;cursor:pointer;transition:all .12s;border:1.5px solid transparent;margin-bottom:2px}
.pk-card:hover{background:rgba(0,0,0,.04)}
.pk-card.pk-selected{border-color:currentColor;background:rgba(26,58,107,.06)}
.pk-card-id{font-size:10px;font-family:monospace;color:var(--text-hint);flex-shrink:0;min-width:38px}
.pk-card-title{font-size:12px;font-weight:600;color:var(--text-primary);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.pk-card-status{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pk-card-status.active{background:var(--status-active)}
.pk-card-status.approved{background:var(--status-approved)}
.pk-card-status.review{background:var(--status-review)}

/* ── Grid section ── */
.grid-section{flex:1;overflow:auto;background:var(--bg-page);display:flex;flex-direction:column}

/* Empty state */
.grid-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-hint);padding:40px}
.grid-empty-icon{font-size:44px;opacity:.35}
.grid-empty-title{font-size:16px;font-weight:700;color:var(--text-secondary)}
.grid-empty-sub{font-size:13px;color:var(--text-hint);text-align:center;line-height:1.6}

/* Grid header */
.grid-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);background:var(--bg-card);display:flex;align-items:center;gap:12px;flex-shrink:0}
.grid-focal-label{font-size:14px;font-weight:700}
.grid-focal-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:rgba(26,58,107,.1);color:var(--step-active)}
.grid-stats{display:flex;gap:10px;margin-left:auto;align-items:center}
.grid-stat-chip{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;background:var(--bg-page);border:1px solid var(--border)}

/* Grid columns container */
.grid-cols{display:flex;align-items:stretch;flex:1;padding:16px 24px;gap:40px;position:relative}

/* Each column */
.gc-col{flex:1;min-width:164px;display:flex;flex-direction:column;gap:8px}
.gc-col.na-col{opacity:.4;pointer-events:none}
.gc-col-hd{display:flex;align-items:center;gap:5px;padding:6px 10px;background:#fff;border:1px solid var(--border);border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;white-space:nowrap}
.gc-col-hd i{font-size:9px}
.gc-col-body{flex:1;display:flex;flex-direction:column;gap:10px}

/* Section within column */
.gc-section{display:flex;flex-direction:column;gap:4px}
.gc-section-hd{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 8px;border-radius:5px;display:flex;align-items:center;gap:5px;margin-bottom:1px}
.gc-section-hd.sh-connected{color:var(--status-active);background:rgba(15,110,86,.06)}
.gc-section-hd.sh-available{color:var(--step-active);background:rgba(26,58,107,.07)}
.gc-section-hd .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gc-section-hd .dot.connected{background:var(--status-active)}
.gc-section-hd .dot.available{background:var(--step-active)}

/* Focal card (the selected card itself) */
.gc-focal{border-radius:10px;border:2.5px solid var(--step-active);background:#fff;padding:10px 11px;box-shadow:0 0 0 4px rgba(26,58,107,.1),var(--shadow-md)}
.gc-focal-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--step-active);background:rgba(26,58,107,.1);padding:1px 6px;border-radius:3px;margin-bottom:5px}
.gc-focal-type{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
.gc-focal-id{font-size:10px;font-family:monospace;color:var(--text-hint)}
.gc-focal-title{font-size:12px;font-weight:700;line-height:1.3;color:var(--text-primary);margin-top:3px}
.gc-focal-meta{font-size:10px;color:var(--text-secondary);line-height:1.4;margin-top:3px}

/* Connected card */
.gc-card{border-radius:8px;border:2px solid;background:#fff;padding:9px 10px;transition:all .15s;position:relative}
.gc-card.gc-connected{cursor:pointer}
.gc-card.gc-connected:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.gc-card.gc-available{border-style:solid!important;border-width:1.5px!important;background:rgba(26,74,154,.04)}
.gc-card.gc-available:hover{background:rgba(26,74,154,.08);transform:translateY(-1px)}
.gc-card-header{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.gc-card-type{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.gc-card-id{font-size:10px;font-family:monospace;color:var(--text-hint);margin-left:auto}
.gc-card-title{font-size:12px;font-weight:700;line-height:1.3;color:var(--text-primary);margin-bottom:5px}
.gc-card-meta{font-size:10px;color:var(--text-secondary);line-height:1.35;margin-bottom:6px}
.gc-card-cluster{font-size:9px;font-weight:700;color:var(--text-hint);background:rgba(0,0,0,.04);padding:1px 5px;border-radius:3px;display:inline-block;margin-bottom:5px}
.gc-card-actions{display:flex;gap:4px;flex-wrap:wrap}
.gc-btn{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;border:1px solid}
.gc-btn-disconnect{border-color:rgba(163,45,45,.2);background:rgba(163,45,45,.04);color:#A32D2D}
.gc-btn-disconnect:hover{background:#A32D2D;color:#fff;border-color:#A32D2D}
.gc-btn-connect{border-color:var(--step-active);background:var(--step-active);color:#fff;width:100%;justify-content:center;padding:5px 10px}
.gc-btn-connect:hover{background:#0F2A52;border-color:#0F2A52}
.gc-btn-explore{border-color:var(--border);background:var(--bg-page);color:var(--text-secondary)}
.gc-btn-explore:hover{background:var(--bg-page);color:var(--text-primary)}
.gc-status-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;flex-shrink:0;margin-left:auto}
.gc-badge-live{background:rgba(15,110,86,.1);color:var(--status-active)}
.gc-badge-approved{background:rgba(26,74,154,.12);color:var(--status-approved)}
.gc-badge-review{background:rgba(184,119,34,.1);color:var(--status-review)}
.gc-badge-pending{background:rgba(26,74,154,.08);color:var(--status-approved);border:1px dashed var(--status-approved)}

/* N/A placeholder */
.gc-na{display:flex;align-items:center;justify-content:center;min-height:60px;border-radius:8px;border:1.5px dashed var(--border);font-size:11px;color:var(--text-hint);text-align:center;padding:12px}

/* Connect confirm modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(23,23,23,.45);z-index:2000;display:none;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:28px;width:460px;box-shadow:0 20px 60px rgba(23,23,23,.2)}
.modal-box h3{font-size:16px;font-weight:700;margin-bottom:6px}
.modal-box p{font-size:13px;color:var(--text-secondary);margin-bottom:18px;line-height:1.6}
.modal-conn-row{display:flex;align-items:center;gap:10px;background:var(--bg-page);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:20px}
.modal-conn-card{flex:1;font-size:13px}
.modal-conn-card .mc-type{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:2px}
.modal-conn-card .mc-id{font-family:monospace;font-size:11px;color:var(--text-hint)}
.modal-conn-card .mc-title{font-weight:700;font-size:13px;display:block}
.modal-conn-arrow{color:var(--text-hint);font-size:14px;flex-shrink:0}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}

.toast.success{background:#0A5A3C}.toast.warn{background:#7A3A00}
.gc-review-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(184,119,34,.15);color:#B87722;margin-left:4px}

/* ── Deploy action bar ── */
.deploy-bar{display:flex;align-items:center;gap:6px;margin-left:auto}
.pending-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;background:rgba(26,74,154,.1);color:var(--status-approved);border:1px solid rgba(26,74,154,.25);white-space:nowrap}

/* Slide panel */
.slide-panel{position:fixed;top:0;right:calc(-1 * var(--panel-w) - 20px);width:var(--panel-w);height:100vh;background:#fff;box-shadow:-4px 0 32px rgba(0,0,0,.14);z-index:300;transition:right .3s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column}
.slide-panel.open{right:0}
.panel-hd{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.panel-title{font-size:16px;font-weight:700;flex:1}
.panel-close{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:14px}
.panel-close:hover{background:var(--bg-page)}
.panel-bd{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px}
.panel-ft{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.form-label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.chip{display:inline-flex;align-items:center;background:var(--bg-page);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:12px;font-weight:600;margin:2px}

/* ── Panel tabs ── */
.panel-tabs{display:flex;border-bottom:2px solid var(--border);flex-shrink:0}
.panel-tab{flex:1;padding:10px 12px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text-secondary);border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.panel-tab.active{color:var(--step-active);border-bottom-color:var(--step-active)}
.panel-tab:hover:not(.active){background:var(--bg-page);color:var(--text-primary)}

/* ── Test panel ── */
.test-chain-flow{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;padding:10px 12px;background:var(--bg-page);border-radius:8px;margin-bottom:16px}
.test-chain-group{display:flex;flex-direction:column;gap:4px;align-items:center}
.test-chain-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}
.test-chain-arrow{color:#C8C8C4;font-size:16px;flex-shrink:0;padding-top:4px}
.test-query{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;min-height:68px;outline:none;line-height:1.55;color:var(--text-primary)}
.test-query:focus{border-color:var(--step-active);box-shadow:0 0 0 3px rgba(26,58,107,.08)}
.test-result-wrap{background:var(--bg-page);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:12px}
.test-result-hd{padding:8px 12px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;background:#fff}
.test-result-body{padding:14px;font-size:13px;line-height:1.8;color:var(--text-primary)}
/* Answer chain steps */
.ans-chain{display:flex;flex-direction:column}
.ans-step{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:2px}
.ans-step.pass{border-color:rgba(15,110,86,.35)}
.ans-step.fail{border-color:rgba(163,45,45,.25)}
.ans-step.pending{border-color:var(--border)}
.ans-step-hd{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#F8F8F6;border-bottom:1px solid var(--border)}
.ans-step.pass .ans-step-hd{background:rgba(15,110,86,.06);border-bottom-color:rgba(15,110,86,.15)}
.ans-step.fail .ans-step-hd{background:rgba(163,45,45,.04);border-bottom-color:rgba(163,45,45,.1)}
.ans-step-num{width:20px;height:20px;border-radius:50%;background:var(--step-active);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ans-step.fail .ans-step-num{background:#A32D2D}
.ans-step.pending .ans-step-num{background:var(--text-hint)}
.ans-step-title{flex:1;font-size:13px;font-weight:700;color:var(--text-primary)}
.chain-sbadge{font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600;white-space:nowrap}
.chain-sbadge.ok{background:rgba(15,110,86,.12);color:#0F6E56}
.chain-sbadge.fail{background:rgba(163,45,45,.1);color:#A32D2D}
.chain-sbadge.llm{background:rgba(90,90,85,.12);color:#5A5A55}
.ans-step-body{padding:12px}
.chain-connector{text-align:center;color:var(--text-hint);font-size:13px;padding:3px 0;line-height:1}
.test-used-cards{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;align-items:center;background:#fff}
.test-used-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;border:1px solid}

/* ── Test condition builder ── */
.test-cond-section{font-size:10px;font-weight:700;color:var(--text-secondary);letter-spacing:.05em;text-transform:uppercase;margin:14px 0 6px;padding-top:10px;border-top:1px solid var(--border)}
.test-cond-section.first{margin-top:0;padding-top:0;border-top:none}
.test-cond-row{padding:8px 10px;background:var(--bg-page);border-radius:6px;margin-bottom:6px}
.test-cond-row-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px}
.test-src-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.test-src-badge.mydata{background:rgba(26,74,154,.1);color:#1A4A9A}
.test-src-badge.promage{background:rgba(107,74,154,.1);color:#6B4A9A}
.test-src-badge.profile{background:rgba(15,110,86,.1);color:#0F6E56}
.test-cond-lbl{font-size:12px;line-height:1.5;color:var(--text-primary);flex:1}
.test-cond-req{font-size:10px;white-space:nowrap;margin-top:2px;flex-shrink:0}
.test-cond-ctrl{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.test-toggle{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.test-toggle.on{background:rgba(15,110,86,.12);border-color:#0F6E56;color:#0F6E56}
.test-toggle.off{background:rgba(201,75,26,.08);border-color:#C94B1A;color:#C94B1A}
.test-gpill{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:inherit;transition:all .15s;color:var(--text-secondary)}
.test-gpill.risk.active{background:rgba(163,45,45,.12);border-color:#A32D2D;color:#A32D2D}
.test-gpill.caution.active{background:rgba(186,117,23,.12);border-color:#BA7517;color:#BA7517}
.test-gpill.good.active{background:rgba(15,110,86,.1);border-color:#0F6E56;color:#0F6E56}
.test-gpill.none-set.active{background:#F0F0EE;border-color:var(--border);color:var(--text-secondary)}
.test-auto-badge{font-size:11px;padding:2px 7px;border-radius:4px;white-space:nowrap}
.test-auto-badge.ok{background:rgba(15,110,86,.1);color:#0F6E56}
.test-auto-badge.fail{background:rgba(201,75,26,.08);color:#C94B1A}
.test-profile-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px 14px;padding:8px 10px;background:var(--bg-page);border-radius:6px;margin-bottom:6px;overflow:hidden}
.test-profile-inline{display:flex;align-items:center;gap:5px}
.test-profile-lbl{font-size:12px;color:var(--text-secondary);font-weight:600;white-space:nowrap}
.test-summary-bar{background:#F4F7FF;border:1px solid #C8D8F8;border-radius:6px;padding:8px 10px;margin-top:8px}
.test-sum-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.test-sum-chip{display:inline-flex;align-items:center;gap:2px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.test-pass-banner{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:700;margin-top:12px;display:flex;align-items:flex-start;gap:8px;border:1px solid}
.test-pass-banner.pass{background:#EDFAF4;border-color:#A0D8C0;color:#0A5A3C}
.test-pass-banner.fail{background:#FFF0F0;border-color:#F0C0C0;color:#8A0000}
.test-fail-list{padding:8px 10px;background:#FFF8F8;border-radius:6px;margin-top:6px;font-size:12px;line-height:1.8;color:#8A4040}

/* ── Chain selector ── */
.chain-sel-wrap{margin-bottom:2px}
.chain-sel-row{display:grid;grid-template-columns:18px 62px 1fr 14px;align-items:center;gap:5px;margin-bottom:5px}
.chain-sel-row.focal{background:rgba(26,74,154,.05);border-radius:5px;padding:3px 6px;margin-left:-6px;margin-right:-6px}
.chain-sel-type-lbl{font-size:10px;font-weight:700;color:var(--text-secondary);white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
.chain-sel-dd{width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:inherit;background:#fff;color:var(--text-primary);cursor:pointer;outline:none}
.chain-sel-dd:focus{border-color:var(--step-active)}
.chain-sel-single{font-size:11px;color:var(--text-primary);padding:3px 6px;background:var(--bg-page);border:1px solid var(--border);border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chain-focal-mark{font-size:11px;color:#1A4A9A;font-weight:900;text-align:center}
/* ── Chat answer preview ── */
.chat-preview-wrap{background:#EEF3FF;border-radius:10px;padding:12px 12px 10px;margin-top:10px}
.chat-question{display:flex;justify-content:flex-end;margin-bottom:10px}
.chat-q-bubble{background:#1A4A9A;color:#fff;padding:8px 12px;border-radius:14px 14px 4px 14px;font-size:12px;line-height:1.55;max-width:88%;word-break:keep-all}
.chat-ai-row{display:flex;gap:7px;align-items:flex-start}
.chat-avatar{width:26px;height:26px;border-radius:50%;background:var(--step-active);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0;margin-top:1px;letter-spacing:-.5px}
.chat-ai-content{flex:1;min-width:0}
.chat-agent-name{font-size:10px;font-weight:700;color:var(--text-secondary);margin-bottom:4px;display:flex;align-items:center;gap:5px}
.chat-kc-tag{background:#1A4A9A;color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.02em}
.chat-bubble{background:#fff;border:1px solid #CDD8F5;border-radius:4px 12px 12px 12px;padding:11px 13px;font-size:12px;line-height:1.8;color:var(--text-primary)}
.chat-bubble p{margin:0 0 7px}
.chat-bubble p:last-child{margin-bottom:0}
.chat-policy-block{margin-top:10px;padding:8px 10px;background:#FFF8F0;border-left:3px solid #C94B1A;border-radius:0 5px 5px 0;font-size:11px;color:#8A4000;line-height:1.65}
.chat-used-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;align-items:center}

/* ── Canvas mode toggle ── */
.mode-toggle{display:flex;gap:2px;background:var(--bg-page);border:1px solid var(--border);border-radius:6px;padding:2px;flex-shrink:0}
.mode-btn{padding:4px 11px;border-radius:4px;font-size:11px;font-weight:700;border:none;background:transparent;cursor:pointer;font-family:inherit;color:var(--text-secondary);transition:all .15s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.mode-btn.active{background:#fff;color:var(--step-active);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.mode-btn:not(.active):hover{color:var(--text-primary)}
/* ── Picker test mode ── */
.pk-check{width:15px;height:15px;border-radius:3px;border:1.5px solid #BCC6D0;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-right:1px}
.pk-card.test-selectable:hover .pk-check{border-color:var(--step-active)}
.pk-card.test-selected .pk-check{background:var(--step-active);border-color:var(--step-active)}
.pk-card.test-disabled{opacity:.3;pointer-events:none}
.pk-card.test-selected{border-color:var(--step-active)!important;background:rgba(15,110,86,.07)!important}
.pk-card.test-selectable{cursor:pointer}
/* ── Floating test bar ── */
.test-float-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:#fff;border:1.5px solid var(--step-active);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 6px 28px rgba(15,110,86,.2);z-index:300;transition:transform .3s cubic-bezier(.34,1.56,.64,1);min-width:380px}
.test-float-bar.visible{transform:translateX(-50%) translateY(0)}
.test-float-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1;min-width:0;align-items:center}
.test-float-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid;white-space:nowrap}
.test-float-empty{font-size:11px;color:var(--text-hint);font-style:italic}
/* ── Grid card test mode ── */
.gc-test-check{width:17px;height:17px;border-radius:4px;border:1.5px solid #B0BBC6;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;margin-left:auto}
.gc-test-check.checked{background:var(--step-active);border-color:var(--step-active)}
.gc-card.test-checked{border-color:var(--step-active)!important;box-shadow:0 0 0 2px rgba(15,110,86,.12)}
.gc-focal.test-checked{border:2px solid var(--step-active)!important;box-shadow:0 0 0 2px rgba(15,110,86,.12)}
.gc-card.test-mode-card{cursor:pointer}
.gc-focal.test-mode-card{cursor:pointer}

/* ── Canvas Filter Bar ── */
.canvas-filterbar{display:flex;align-items:center;gap:10px;padding:7px 16px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0}
.cvf-pills{display:flex;gap:4px}
.cvf-pill{padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:inherit;color:var(--text-secondary);transition:all .15s}
.cvf-pill.active{background:var(--step-active);color:#fff;border-color:var(--step-active)}
.cvf-pill.active-fail{background:#C94B1A;color:#fff;border-color:#C94B1A}
.cvf-pill:not(.active):hover{border-color:var(--text-secondary);color:var(--text-primary)}
.cvf-search-wrap{display:flex;align-items:center;gap:6px;background:var(--bg-page);border:1px solid var(--border);border-radius:6px;padding:4px 9px;flex:1;max-width:260px;margin-left:auto}
.cvf-search{border:none;background:transparent;font-size:12px;font-family:inherit;color:var(--text-primary);outline:none;width:100%}
.cvf-search::placeholder{color:var(--text-hint)}

/* ── Card Detail (read-only fields) ── */
.detail-field{margin-bottom:14px}
.detail-label{font-size:11px;font-weight:700;color:var(--text-secondary);margin-bottom:4px;letter-spacing:.02em;text-transform:uppercase}
.detail-value{padding:8px 10px;background:var(--bg-page);border:1px solid var(--border);border-radius:6px;font-size:13px;line-height:1.6;color:var(--text-primary);word-break:break-all}
.detail-header-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;margin-bottom:18px;border:1px solid}
</style>
</head>
<body>
<div class="layout">

<!-- Sidebar -->
<nav class="sidebar" id="sidebar"></nav>

<!-- Workspace -->
<div class="workspace">

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-title"><i class="fa-solid fa-diagram-project" style="color:var(--step-active)"></i> 연결·테스트·배포</span>
    <div class="tb-divider"></div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeConnect" onclick="switchCanvasMode('connect')">
        <i class="fa-solid fa-link" style="font-size:10px"></i> 연결 모드
      </button>
      <button class="mode-btn" id="modeTest" onclick="switchCanvasMode('test')">
        <i class="fa-solid fa-flask" style="font-size:10px"></i> 테스트 모드
      </button>
    </div>
    <!-- Focal chip appears when card selected -->
    <div class="focal-chip" id="focalChip">
      <span id="focalChipLabel" style="font-size:12px;font-weight:700"></span>
      <button class="focal-chip-x" onclick="clearSelection()" title="선택 해제"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="deploy-bar">
      <span class="pending-badge" id="pendingBadge" style="display:none">
        <i class="fa-solid fa-circle-dot" style="font-size:9px"></i>
        <span id="pendingCount">0</span>개 준비 연결
      </span>
      <a href="11_dry-run.html" class="btn btn-secondary btn-sm"><i class="fa-solid fa-flask" style="font-size:10px"></i> 사전 테스트</a>
    </div>
  </div>

  <!-- Canvas Filter Bar -->
  <div class="canvas-filterbar">
    <div class="cvf-pills" id="cvfPills">
      <button class="cvf-pill active" onclick="setStatusFilter('all')">전체</button>
      <button class="cvf-pill" onclick="setStatusFilter('active')">라이브</button>
      <button class="cvf-pill" onclick="setStatusFilter('approved')">승인완료</button>
    </div>
    <div class="cvf-search-wrap">
      <i class="fa-solid fa-magnifying-glass" style="font-size:11px;color:var(--text-hint)"></i>
      <input class="cvf-search" type="text" placeholder="카드명 또는 ID 검색" oninput="onCanvasSearch(this.value)">
    </div>
  </div>

  <!-- ① Card Picker -->
  <div class="picker-panel">
    <div class="picker-label-row">
      <span class="picker-label" id="pickerLabel">① 카드 선택</span>
      <span class="picker-hint" id="pickerHint">— 카드를 클릭하면 연결 현황이 아래에 표시됩니다</span>
    </div>
    <div class="picker-cols" id="pickerCols"></div>
  </div>

  <!-- ② Connection Grid -->
  <div class="grid-section" id="gridSection">

    <!-- Empty state -->
    <div class="grid-empty" id="gridEmpty">
      <div class="grid-empty-icon"><i class="fa-solid fa-diagram-project"></i></div>
      <div class="grid-empty-title">위에서 카드를 선택하세요</div>
      <div class="grid-empty-sub">카드를 선택하면 해당 카드의 연결 현황과<br>연결 가능한 카드 목록이 표시됩니다</div>
    </div>

    <!-- Grid content (hidden until card selected) -->
    <div id="gridContent" style="display:none;flex-direction:column;flex:1">
      <div class="grid-header" id="gridHeader"></div>
      <div class="grid-cols" id="gridCols"></div>
    </div>

  </div>

  <!-- Test mode floating action bar -->
  <div class="test-float-bar" id="testFloatBar">
    <i class="fa-solid fa-flask" style="color:var(--step-active);font-size:14px;flex-shrink:0"></i>
    <div class="test-float-chips" id="testFloatChips">
      <span class="test-float-empty">위에서 카드를 체크하세요</span>
    </div>
    <button class="btn btn-primary" style="white-space:nowrap;flex-shrink:0;padding:6px 14px" onclick="runCanvasTest()" id="testFloatBtn" disabled>
      <i class="fa-solid fa-play" style="font-size:10px"></i> 테스트 실행
    </button>
  </div>

</div><!-- workspace -->
</div><!-- layout -->

<!-- Connect/Disconnect modal -->
<div class="modal-backdrop" id="actionModal">
  <div class="modal-box">
    <h3 id="modalTitle">연결 추가</h3>
    <p id="modalDesc"></p>
    <div id="modalWarn" style="display:none;background:#FFF9EC;border:1px solid #F0D880;border-radius:6px;padding:10px 14px;margin:8px 0;font-size:13px;color:#7A5A00;line-height:1.5"></div>
    <div class="modal-conn-row">
      <div class="modal-conn-card" id="modalFrom"></div>
      <div class="modal-conn-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      <div class="modal-conn-card" id="modalTo"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="modalConfirmBtn" onclick="confirmAction()"></button>
    </div>
  </div>
</div>

<!-- Slide panel -->
<div class="slide-panel" id="slidePanel">
  <div class="panel-hd">
    <span class="panel-title" id="panelTitle">카드 정보</span>
    <button class="panel-close" onclick="closePanel()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="panel-tabs">
    <button class="panel-tab active" id="tabInfo" onclick="switchPanelTab('info')">

    </button>
  </div>
  <div class="panel-bd" id="panelBody"></div>
  <div class="panel-ft" id="panelFooter"></div>
</div>

function getFilteredPickerCards() {

function edgeExists(fromId, toId) {
  return EDGES.some(e => e.from === fromId && e.to === toId);
}

function getEdge(fromId, toId) {
  return EDGES.find(e => e.from === fromId && e.to === toId);
}

// Bidirectional BFS from cardId → returns Set of all connected card IDs
function computeChain(cardId) {
  const visited = new Set([cardId]);
  const queue = [cardId];
  while (queue.length) {
    const id = queue.shift();
    EDGES.forEach(e => {
      if (e.from === id && !visited.has(e.to))   { visited.add(e.to);   queue.push(e.to); }
      if (e.to   === id && !visited.has(e.from)) { visited.add(e.from); queue.push(e.from); }
    });
  }
  return visited;
}

// 체인 연결 엣지 탐색 — 포컬 카드와의 직접 엣지를 우선 반환
function findChainEdge(cardId, chainSet, focalId) {
  if (focalId) {
    const direct = EDGES.find(e =>
      (e.from === cardId && e.to   === focalId) ||
      (e.to   === cardId && e.from === focalId)
    );
    if (direct) return direct;
  }
  return EDGES.find(e =>
    (e.from === cardId && chainSet.has(e.to)) ||
    (e.to   === cardId && chainSet.has(e.from))
  ) || null;
}

// 선택된 카드(focalCard)와 직접 연결 가능한지만 체크 (체인 경유 X)
// Rule에 연결된 Evidence 개수 반환
function getRuleEvidenceCount(ruleId) {
  return EDGES.filter(e => e.from === ruleId && CARDS.find(c => c.id === e.to && c.type === 'evidence')).length;
}

// Risk-type ↔ Rule은 1:1 전속 — 어느 한쪽이 이미 연결돼 있으면 차단
function riskRuleBlocked(riskId, ruleId) {
  const riskAlreadyHasRule = EDGES.some(e => e.from === riskId && CARDS.find(c => c.id === e.to && c.type === 'rule'));
  const ruleAlreadyHasRisk = EDGES.some(e => e.to === ruleId && CARDS.find(c => c.id === e.from && c.type === 'risk'));
  return riskAlreadyHasRule || ruleAlreadyHasRisk;
}

function findDirectTarget(card, focalCard) {
  if (CONNECT_RULES[focalCard.type]?.includes(card.type) && !edgeExists(focalCard.id, card.id)) {
    if (focalCard.type === 'risk' && card.type === 'rule' && riskRuleBlocked(focalCard.id, card.id)) return null;
    return {from: focalCard.id, to: card.id};
  }
  if (CONNECT_RULES[card.type]?.includes(focalCard.type) && !edgeExists(card.id, focalCard.id)) {
    if (card.type === 'risk' && focalCard.type === 'rule' && riskRuleBlocked(card.id, focalCard.id)) return null;
    return {from: card.id, to: focalCard.id};
  }
  return null;
}

function pickerCardHTML(card) {
  const color = TYPE_COLORS[card.type];

  // ── 연결 모드 / 테스트 모드 탐색 (동일 렌더링) ──
  const isSelected = card.id === selectedCardId;

    : card.status === 'approved'
      ? '<span class="pk-card-status approved" title="승인완료"></span>'

  const statusLabel = card.status === 'review'
    ? '<span style="font-size:9px;color:var(--status-review);font-weight:700;flex-shrink:0">승인요청</span>'
    : card.status === 'approved'
      ? '<span style="font-size:9px;color:var(--status-approved);font-weight:700;flex-shrink:0">승인완료</span>'
      : '';

  return '<div class="pk-card' + (isSelected ? ' pk-selected' : '') + '"' +
    (isSelected ? ' style="border-color:' + color + ';background:' + hexToRgba(color, 0.06) + '"' : '') +
    ' onclick="selectCard(\'' + card.id + '\')">' +
    statusDot +
    '<span class="pk-card-id">' + card.id + '</span>' +
    '<span class="pk-card-title">' + card.title + '</span>' +
    statusLabel +

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

function hasEdge(cardId) {
  return EDGES.some(function(e) { return e.from === cardId || e.to === cardId; });
}

function switchCanvasMode(mode) {
  canvasMode = mode;
  document.getElementById('modeConnect').classList.toggle('active', mode === 'connect');
  document.getElementById('modeTest').classList.toggle('active', mode === 'test');
  var labelEl = document.getElementById('pickerLabel');
  var hintEl  = document.getElementById('pickerHint');
  if (mode === 'test') {
    if (labelEl) labelEl.textContent = '① 체인 탐색';
    if (hintEl)  hintEl.textContent  = '— 클릭해 체인 구조 확인 후 캔버스에서 카드를 체크하세요';
    testSelection = {};
    updateTestFloatBar();
    document.getElementById('slidePanel').classList.remove('open');
  } else {
    if (labelEl) labelEl.textContent = '① 카드 선택';
    if (hintEl)  hintEl.textContent  = '— 카드를 클릭하면 연결 현황이 아래에 표시됩니다';
    testSelection = {};
    document.getElementById('testFloatBar').classList.remove('visible');
  }
  renderPicker();
  renderGrid();
}

function onTestPickerClick(cardId) {
  var card = CARDS.find(function(c) { return c.id === cardId; });
  if (!card || !hasEdge(cardId)) return;
  if (testSelection[card.type] === cardId) {
    delete testSelection[card.type];
  } else {
    testSelection[card.type] = cardId;
  }
  renderPicker();
  updateTestFloatBar();
}

function onTestGridClick(cardId) {
  var card = CARDS.find(function(c) { return c.id === cardId; });
  if (!card) return;
  if (testSelection[card.type] === cardId) {
    delete testSelection[card.type];
  } else {
    testSelection[card.type] = cardId;
  }
  renderGrid();
  updateTestFloatBar();
}

function updateTestFloatBar() {
  var bar    = document.getElementById('testFloatBar');
  var chips  = document.getElementById('testFloatChips');
  var runBtn = document.getElementById('testFloatBtn');
  var order  = ['concept','risk','rule','evidence','policy'];
  var selected = order.map(function(t) { return testSelection[t]; }).filter(Boolean);

  if (!selected.length) {
    if (chips) chips.innerHTML = '<span class="test-float-empty">캔버스에서 카드를 체크하세요</span>';
    if (runBtn) runBtn.disabled = true;
    if (bar)    bar.classList.remove('visible');
    return;
  }
  if (bar) bar.classList.add('visible');
  var hasRule = !!testSelection.rule;
  if (runBtn) runBtn.disabled = !hasRule;

  var chipHTML = order.map(function(type) {
    var id = testSelection[type];
    if (!id) return '';
    var c = CARDS.find(function(cc) { return cc.id === id; });
    if (!c) return '';
    var color = TYPE_COLORS[c.type];
    return '<span class="test-float-chip" style="color:' + color + ';border-color:' + hexToRgba(color,.3) + ';background:' + hexToRgba(color,.06) + '">' +
      '<i class="fa-solid ' + TYPE_ICONS[c.type] + '" style="font-size:8px"></i> ' + c.id + '</span>';
  }).filter(Boolean).join('');

  if (!hasRule) {
    chipHTML += '<span style="font-size:10px;color:#C94B1A;margin-left:2px;white-space:nowrap">' +
      '<i class="fa-solid fa-triangle-exclamation" style="font-size:9px"></i> Rule 선택 필요</span>';
  }
  if (chips) chips.innerHTML = chipHTML;
}

function runCanvasTest() {
  if (!testSelection.rule) return;
  testChain     = Object.assign({}, testSelection);
  panelTestMode = 'canvas';
  panelCardId   = testSelection.concept || testSelection.rule;
  initTestProfile(testSelection.rule);
  switchPanelTab('test');
  document.getElementById('slidePanel').classList.add('open');
}

function buildSelectedChainVisual(chainCards) {
  var TYPE_ORDER = ['concept','risk','rule','evidence','policy'];
  var groups = TYPE_ORDER
    .map(function(t) { return chainCards.filter(function(c) { return c.type === t; }); })
    .filter(function(g) { return g.length; });
  var html = '<div class="test-chain-flow">';
  groups.forEach(function(group, gi) {
    if (gi > 0) html += '<span class="test-chain-arrow">→</span>';
    html += '<div class="test-chain-group">';
    group.forEach(function(c) {
      var color = TYPE_COLORS[c.type];
      html += '<span class="test-chain-badge" style="background:' + hexToRgba(color,.15) + ';color:' + color + ';outline:1.5px solid ' + color + ';font-weight:800">' +
        '<i class="fa-solid ' + TYPE_ICONS[c.type] + '" style="font-size:8px"></i> ' + c.id + '</span>';
    });
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderGrid() {
  if (!selectedCardId) return;

  const focalCard    = CARDS.find(c => c.id === selectedCardId);
  const visibleCards = CARDS.filter(c => c.status !== 'draft'); // active + approved + review (draft 제외)
  const chain        = computeChain(selectedCardId);

  document.getElementById('gridEmpty').style.display = 'none';
  document.getElementById('gridContent').style.display = 'flex';

  const chainSize    = chain.size - 1; // 포컬 제외
  // 직접 연결 가능 카드 수 (포컬과 타입 규칙이 맞고 아직 미연결)
  const availableCount = visibleCards.filter(c =>
    !chain.has(c.id) && c.type !== focalCard.type && findDirectTarget(c, focalCard)
  ).length;

  document.getElementById('gridHeader').innerHTML =
    '<i class="fa-solid ' + TYPE_ICONS[focalCard.type] + '" style="color:' + TYPE_COLORS[focalCard.type] + ';font-size:15px"></i>' +
    '<span class="grid-focal-label" style="color:' + TYPE_COLORS[focalCard.type] + '">' + focalCard.title + '</span>' +
    '<span class="grid-focal-badge"><i class="fa-solid fa-fw fa-tag" style="font-size:9px"></i>' + focalCard.id + ' · ' + TYPE_NAMES[focalCard.type] + ' · ' + focalCard.cluster + '</span>' +
    '<div class="grid-stats">' +
      (chainSize > 0
        ? '<div class="grid-stat-chip"><span style="color:var(--status-active);font-size:10px">●</span> 체인 ' + chainSize + '개 연결됨</div>'
        : '<div class="grid-stat-chip" style="color:#C94B1A"><i class="fa-solid fa-triangle-exclamation" style="font-size:10px"></i> 연결 없음</div>') +
      (availableCount > 0
        ? '<div class="grid-stat-chip" style="color:var(--step-active)"><i class="fa-solid fa-circle-plus" style="font-size:10px"></i> 연결 가능 ' + availableCount + '개</div>'
        : '') +
      (canvasMode !== 'test'
        ? '<button class="btn btn-secondary btn-sm" onclick="openTest(\'' + focalCard.id + '\')"><i class="fa-solid fa-flask"></i> 답변 테스트</button>'
        : '') +
      '<a href="' + EDITOR_MAP[focalCard.type] + '" class="btn btn-secondary btn-sm" style="text-decoration:none"><i class="fa-solid fa-pen-to-square"></i> 카드 편집</a>' +
    '</div>';

  const colsEl = document.getElementById('gridCols');
  colsEl.innerHTML = '';

  GRID_COLS.forEach(col => {
    const isFocalCol = col.types.includes(focalCard.type);
    const color      = TYPE_COLORS[col.types[0]];

    const colEl  = document.createElement('div');
    colEl.className = 'gc-col';

    colEl.innerHTML = '<div class="gc-col-hd" style="color:' + color + '">' +
      '<i class="fa-solid ' + col.icon + '"></i>' + col.label + '</div>';

    const bodyEl = document.createElement('div');
    bodyEl.className = 'gc-col-body';

    if (isFocalCol) {
      // 선택된 카드 자체
      bodyEl.innerHTML = focalCardHTML(focalCard);
    } else {
      // 이 컬럼의 카드(active+review): 체인 속한 것 / 포컬과 직접 연결 가능한 것 구분
      const colCards  = visibleCards.filter(c => col.types.includes(c.type));
      const inChain   = colCards.filter(c => chain.has(c.id));
      const available = colCards.filter(c => !chain.has(c.id) && findDirectTarget(c, focalCard) && c.cluster === focalCard.cluster);

      if (inChain.length) {
        bodyEl.innerHTML += sectionHTML('연결됨', 'connected', inChain.length);
        inChain.forEach(c => { bodyEl.innerHTML += chainCardHTML(c, chain, selectedCardId); });
      }
      if (available.length && canvasMode !== 'test') {
        bodyEl.innerHTML += sectionHTML('연결 가능', 'available', available.length);
        available.forEach(c => { bodyEl.innerHTML += availableCardHTML(c, focalCard); });
      }
      if (!inChain.length && !available.length) {
        bodyEl.innerHTML = '<div class="gc-na">해당 없음</div>';
        colEl.classList.add('na-col');
      }
    }

    colEl.appendChild(bodyEl);
    colsEl.appendChild(colEl);
  });
}

// 체인에 속한 카드 — 연결 경로 + 제거 버튼
function chainCardHTML(card, chainSet, focalId) {

  const fromId = cedge ? cedge.from : null;
  const toId   = cedge ? cedge.to   : null;

  const isCross      = false; // crossCluster 엣지 타입 폐기 — active/pending 2종만 사용

    ? '<div style="font-size:9px;color:var(--text-hint);margin-bottom:4px;display:flex;align-items:center;gap:4px">' +

function openConnect(fromId, toId) {
  pendingAction = {type:'connect', fromId, toId};
  const fromCard = CARDS.find(c => c.id === fromId);
  const toCard   = CARDS.find(c => c.id === toId);

  const hasPending = fromCard.status === 'approved' || toCard.status === 'approved';
  document.getElementById('modalTitle').textContent = hasPending ? '준비 연결 추가' : '연결 추가';
  document.getElementById('modalDesc').textContent = hasPending
    ? '승인완료 카드를 연결합니다. 캔버스에 준비 연결(점선)로 표시되며, 라이브 전환 후 Clark AI에 반영됩니다.'
    : '아래 두 카드를 연결합니다. 확인 후 캔버스 및 Clark AI에 즉시 반영됩니다.';

  // Rule → Evidence 3개 초과 시 경고
  const warnEl   = document.getElementById('modalWarn');
  const ruleCard = fromCard.type === 'rule' ? fromCard : (toCard.type === 'rule' ? toCard : null);
  const evCard   = fromCard.type === 'evidence' ? fromCard : (toCard.type === 'evidence' ? toCard : null);
  if (ruleCard && evCard) {
    const evCount = getRuleEvidenceCount(ruleCard.id);
    if (evCount >= 3) {
      warnEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="margin-right:6px"></i>이 Rule에 이미 Evidence <strong>' + evCount + '개</strong>가 연결되어 있습니다. 3개 이하 권장 — Evidence가 많을수록 Clark AI의 맥락 선택 품질이 저하될 수 있습니다.';
      warnEl.style.display = 'block';
    } else {
      warnEl.style.display = 'none';
    }
  } else {
    warnEl.style.display = 'none';
  }

  renderModalCards(fromCard, toCard);
  document.getElementById('modalConfirmBtn').innerHTML = '<i class="fa-solid fa-plus"></i> 연결 추가';
  document.getElementById('modalConfirmBtn').className = 'btn btn-primary';
  document.getElementById('actionModal').classList.add('open');
}

function openDisconnect(fromId, toId) {
  pendingAction = {type:'disconnect', fromId, toId};
  const fromCard = CARDS.find(c => c.id === fromId);
  const toCard   = CARDS.find(c => c.id === toId);

  document.getElementById('modalTitle').textContent = '연결 제거';
  document.getElementById('modalDesc').textContent = '이 연결을 제거합니다. AI 답변 체인에서 즉시 제외됩니다.';
  renderModalCards(fromCard, toCard);
  document.getElementById('modalConfirmBtn').innerHTML = '<i class="fa-solid fa-xmark"></i> 연결 제거';
  document.getElementById('modalConfirmBtn').className = 'btn btn-primary' ;
  document.getElementById('modalConfirmBtn').style.background = '#A32D2D';
  document.getElementById('actionModal').classList.add('open');
}

function renderModalCards(fromCard, toCard) {
  document.getElementById('modalFrom').innerHTML =
    '<span class="mc-type" style="color:' + TYPE_COLORS[fromCard.type] + '">' + TYPE_NAMES[fromCard.type] + '</span>' +
    '<span class="mc-id">' + fromCard.id + ' · ' + fromCard.cluster + '</span>' +
    '<span class="mc-title">' + fromCard.title + '</span>';
  document.getElementById('modalTo').innerHTML =
    '<span class="mc-type" style="color:' + TYPE_COLORS[toCard.type] + '">' + TYPE_NAMES[toCard.type] + '</span>' +
    '<span class="mc-id">' + toCard.id + ' · ' + toCard.cluster + '</span>' +
    '<span class="mc-title">' + toCard.title + '</span>';
}

function closeModal() {
  document.getElementById('actionModal').classList.remove('open');
  document.getElementById('modalConfirmBtn').style.background = '';
  document.getElementById('modalWarn').style.display = 'none';
  pendingAction = null;
}

function confirmAction() {
  if (!pendingAction) return;

  if (pendingAction.type === 'connect') {
    if (!edgeExists(pendingAction.fromId, pendingAction.toId)) {
      const fromCard   = CARDS.find(c => c.id === pendingAction.fromId);
      const toCard     = CARDS.find(c => c.id === pendingAction.toId);
      const edgeStatus = (fromCard.status === 'approved' || toCard.status === 'approved') ? 'pending' : 'active';
      EDGES.push({from: pendingAction.fromId, to: pendingAction.toId, status: edgeStatus});
    }
    showToast('✅ 연결이 추가되었습니다', 'success');
  } else {
    const idx = EDGES.findIndex(e => e.from === pendingAction.fromId && e.to === pendingAction.toId);
    if (idx !== -1) EDGES.splice(idx, 1);
    showToast('연결이 제거되었습니다', '');
  }

  closeModal();
  renderGrid();
  renderPicker();
  requestAnimationFrame(drawLines);
  updateDeployBar();
}

// ============================================================
// DEPLOY BAR
// ============================================================
function getPendingEdges() {
  return EDGES.filter(e => e.status === 'pending');
}

function updateDeployBar() {
  const pending = getPendingEdges();
  const badge   = document.getElementById('pendingBadge');
  const count   = document.getElementById('pendingCount');
  if (!badge) return;
  if (pending.length > 0) {
    badge.style.display = 'inline-flex';
    count.textContent   = pending.length;
  } else {
    badge.style.display = 'none';
  }
}

function initTestChain(cardId) {
  var chain      = computeChain(cardId);
  var chainCards = CARDS.filter(function(c) { return chain.has(c.id); });
  testChain = {};
  ['concept','risk','rule','evidence','policy'].forEach(function(type) {
    var available = chainCards.filter(function(c) { return c.type === type; });
    if (available.length) {
      testChain[type] = (available.find(function(c) { return c.id === cardId; }) || available[0]).id;
    }
  });
}

function initTestProfile(ruleId) {
  var conds = (CARD_DETAILS[ruleId] || {}).conditions || [];
  var newConds = {}, newPromage = {};
  conds.forEach(function(cond, i) {
    var key = ruleId + '_' + i;
    if (cond.source === 'MYDATA') {
      newConds[key] = true;
    } else if (cond.source === 'PROMAGE') {
      var gMap = {'위험':'risk','주의':'caution','양호':'good'};
      newPromage[key] = cond.required ? (gMap[cond.value] || null) : null;
    }
  });
  testProfile.conditions = newConds;
  testProfile.promage    = newPromage;
}

}

function buildChainSelectorHTML(card) {
  var chain      = computeChain(card.id);
  var chainCards = CARDS.filter(function(c) { return chain.has(c.id); });
  var TYPE_CONFIG = [
    { type:'concept',  icon:'fa-lightbulb',         label:'Concept',   color:'#1A4A9A' },
    { type:'risk',     icon:'fa-circle-exclamation', label:'Risk-type', color:'#C94B1A' },
    { type:'rule',     icon:'fa-scale-balanced',     label:'Rule',      color:'#9A1A1A' },
    { type:'evidence', icon:'fa-database',           label:'Evidence',  color:'#1A7A4A' },
    { type:'policy',   icon:'fa-file-shield',        label:'Policy',    color:'#5A5A55' },
  ];

  var html = '<div class="test-cond-section first">' +
    '<i class="fa-solid fa-sitemap" style="font-size:9px;margin-right:3px;color:#1A4A9A"></i>① 테스트 체인 구성' +
  '</div><div class="chain-sel-wrap">';

  TYPE_CONFIG.forEach(function(tc) {
    var available = chainCards.filter(function(c) { return c.type === tc.type; });
    if (!available.length) return;
    var selected = testChain[tc.type];
    var isFocal  = available.some(function(c) { return c.id === card.id; });
    var single   = available.length === 1;

    html += '<div class="chain-sel-row' + (isFocal ? ' focal' : '') + '">';
    html += '<i class="fa-solid ' + tc.icon + '" style="font-size:10px;color:' + tc.color + ';text-align:center"></i>';
    html += '<span class="chain-sel-type-lbl">' + tc.label + '</span>';
    if (single) {
      html += '<div class="chain-sel-single"><strong style="color:' + tc.color + '">' + available[0].id + '</strong> ' + available[0].title + '</div>';
    } else {
      html += '<select class="chain-sel-dd" onchange="onTestChainSelect(\'' + tc.type + '\', this.value)">';
      available.forEach(function(c) {
        html += '<option value="' + c.id + '"' + (selected === c.id ? ' selected' : '') + '>' + c.id + ' — ' + c.title + '</option>';
      });
      html += '</select>';
    }
    html += isFocal ? '<span class="chain-focal-mark">★</span>' : '<span></span>';
    html += '</div>';
  });

  html += '</div>';
  return html;
}

function onTestChainSelect(type, id) {
  testChain[type] = id;
  if (type === 'rule') initTestProfile(id);
  if (type === 'concept') {
    var qEl = document.getElementById('testQueryInput');
    if (qEl) {
      var c = CARDS.find(function(cc) { return cc.id === id; });
      qEl.value = TEST_QUERIES[id] || (c ? c.title + '에 대해 알려주세요' : qEl.value);
    }
  }
  var ruleId   = testChain.rule;
  var ruleCard = ruleId ? CARDS.find(function(c) { return c.id === ruleId; }) : null;
  var condSec  = document.getElementById('testCondSection');
  if (condSec) condSec.innerHTML = buildRuleCondRowsHTML(ruleId);
  updateTestSummary(ruleCard);
  var ra = document.getElementById('testResultArea');
  if (ra) ra.innerHTML = '';
}

function buildChainVisual(card, chain) {
  var TYPE_ORDER = ['concept','risk','rule','evidence','policy'];
  var chainCards = CARDS.filter(function(c) { return chain.has(c.id); });
  var groups     = TYPE_ORDER
    .map(function(t) { return chainCards.filter(function(c) { return c.type === t; }); })
    .filter(function(g) { return g.length; });

  var html = '<div class="test-chain-flow">';
  groups.forEach(function(group, gi) {
    if (gi > 0) html += '<span class="test-chain-arrow">→</span>';
    html += '<div class="test-chain-group">';
    group.forEach(function(c) {
      var color   = TYPE_COLORS[c.type];
      var isFocal = c.id === panelCardId;
      html += '<span class="test-chain-badge" style="' +
        'background:' + hexToRgba(color, isFocal ? 0.18 : 0.08) + ';color:' + color + ';' +
        (isFocal ? 'outline:1.5px solid ' + color + ';font-weight:800;' : '') + '">' +
        '<i class="fa-solid ' + TYPE_ICONS[c.type] + '" style="font-size:8px"></i> ' + c.id +
        (isFocal ? ' ★' : '') + '</span>';
    });
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function buildRuleCondRowsHTML(ruleId) {
  if (!ruleId) {
    return '<div style="font-size:12px;color:var(--text-hint);padding:8px 10px;background:var(--bg-page);border-radius:6px;margin-bottom:6px">' +
      '이 체인에 연결된 Rule 카드가 없습니다.</div>';
  }
  var ruleCard = CARDS.find(function(c) { return c.id === ruleId; });
  if (!ruleCard) return '';

  var conds = (CARD_DETAILS[ruleCard.id] || {}).conditions || [];
  var html  = '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px">' +
    '<span style="font-weight:700;color:#9A1A1A">' + ruleCard.id + '</span> ' + ruleCard.title + '</div>';

  if (!conds.length) {
    return html + '<div style="font-size:12px;color:var(--text-hint);padding:8px 10px;background:var(--bg-page);border-radius:6px">' +
      '이 Rule의 조건이 정의되어 있지 않습니다.</div>';
  }

  conds.forEach(function(cond, i) {
    var key    = ruleCard.id + '_' + i;
    var srcCls = {MYDATA:'mydata', PROMAGE:'promage', PROFILE:'profile'}[cond.source] || 'mydata';
    var reqTag = cond.required
      ? '<span class="test-cond-req" style="color:#C94B1A;font-weight:700">필수</span>'
      : '<span class="test-cond-req">선택</span>';
    var ctrlHtml = '';

    if (cond.source === 'PROFILE') {
      if (cond.op === 'IN') {
        ctrlHtml = '<span class="test-auto-badge ok">✓ 전 성별 해당</span>';
      } else if (cond.op === 'EQ' && (cond.value === '남' || cond.value === '여')) {
        var gmet = testProfile.profile.gender === cond.value;
        ctrlHtml = '<span id="testGenderBadge_' + key + '" class="test-auto-badge ' + (gmet ? 'ok' : 'fail') + '">' +
          (gmet ? '✓ 충족' : '✗ 미충족') + ' (현재 ' + testProfile.profile.gender + '성)</span>';
      } else if (cond.op === 'EQ' && (cond.value === '기혼' || cond.value === '미혼')) {
        var marriedCur = testProfile.profile.married || '무관';
        var mmet = marriedCur === cond.value || marriedCur === '무관';
        ctrlHtml = '<span id="testMarriedBadge_' + key + '" class="test-auto-badge ' + (mmet ? 'ok' : 'fail') + '">' +
          (mmet ? '✓ 충족' : '✗ 미충족') + ' (현재 ' + marriedCur + ')</span>';
      } else if (cond.op === 'EQ' && (cond.value === '있음' || cond.value === '없음')) {
        var hasChildCur = testProfile.profile.has_child || '무관';
        var hmet = hasChildCur === cond.value || hasChildCur === '무관';
        ctrlHtml = '<span id="testHasChildBadge_' + key + '" class="test-auto-badge ' + (hmet ? 'ok' : 'fail') + '">' +
          (hmet ? '✓ 충족' : '✗ 미충족') + ' (현재 ' + hasChildCur + ')</span>';
      } else if (cond.op === 'EQ' && (cond.value === '유' || cond.value === '무')) {
        var drivesCur = testProfile.profile.drives || '무관';
        var dmet = drivesCur === cond.value || drivesCur === '무관';
        ctrlHtml = '<span id="testDrivesBadge_' + key + '" class="test-auto-badge ' + (dmet ? 'ok' : 'fail') + '">' +
          (dmet ? '✓ 충족' : '✗ 미충족') + ' (현재 ' + drivesCur + ')</span>';
      } else if (cond.op === 'BETWEEN') {
        var bpts = cond.value.split(',');
        var bage = testProfile.profile.age;
        var bmet = bage >= parseInt(bpts[0]) && bage <= parseInt(bpts[1]);
        ctrlHtml = '<span id="testProfileBadge_' + key + '" class="test-auto-badge ' + (bmet ? 'ok' : 'fail') + '">' +
          (bmet ? '✓ 충족' : '✗ 미충족') + ' (현재 ' + bage + '세)</span>';
      } else {
        var age = testProfile.profile.age;
        var val = parseInt(cond.value);
        var amet = cond.op === 'GTE' ? age >= val : cond.op === 'LTE' ? age <= val
                 : cond.op === 'GT'  ? age >  val : cond.op === 'LT'  ? age <  val : false;
        ctrlHtml = '<span id="testProfileBadge_' + key + '" class="test-auto-badge ' + (amet ? 'ok' : 'fail') + '">' +
          (amet ? '✓ 충족' : '✗ 미충족') + ' (현재 ' + age + '세)</span>';
      }
    } else if (cond.source === 'PROMAGE') {
      var isMet = testProfile.conditions[key] !== false;
      ctrlHtml = '<button class="test-toggle ' + (isMet ? 'on' : 'off') + '" ' +
        'onclick="onTestCondToggle(\'' + ruleCard.id + '\',' + i + ')">' +
        (isMet ? '✓ 충족' : '✗ 미충족') + '</button>';
    } else {
      var isMet = testProfile.conditions[key] !== false;
      ctrlHtml = '<button class="test-toggle ' + (isMet ? 'on' : 'off') + '" ' +
        'onclick="onTestCondToggle(\'' + ruleCard.id + '\',' + i + ')">' +
        (isMet ? '✓ 충족' : '✗ 미충족') + '</button>';
    }

    html += '<div class="test-cond-row">' +
      '<div class="test-cond-row-top">' +
        '<span class="test-src-badge ' + srcCls + '">' + cond.sourceLabel + '</span>' +
        '<span class="test-cond-lbl">' + cond.label + '</span>' +
        reqTag +
      '</div>' + ctrlHtml + '</div>';
  });

  return html;
}

function onTestCondToggle(ruleId, idx) {
  var key = ruleId + '_' + idx;
  testProfile.conditions[key] = testProfile.conditions[key] === false ? true : false;
  var ruleCard = CARDS.find(function(c) { return c.id === ruleId; });
  var body = document.getElementById('panelBody');
  var st   = body.scrollTop;
  var condSec = document.getElementById('testCondSection');
  if (condSec) condSec.innerHTML = buildRuleCondRowsHTML(ruleId);
  body.scrollTop = st;
  updateTestSummary(ruleCard);
  var ra = document.getElementById('testResultArea');
  if (ra) ra.innerHTML = '';
}

function onTestProfileChange() {
  var ageEl      = document.getElementById('testAge');
  var genderEl   = document.querySelector('input[name="testGender"]:checked');
  var marriedEl  = document.getElementById('testMarried');
  var hasChildEl = document.getElementById('testHasChild');
  var drivesEl   = document.getElementById('testDrives');
  if (ageEl)      testProfile.profile.age       = parseInt(ageEl.value) || 45;
  if (genderEl)   testProfile.profile.gender    = genderEl.value;
  if (marriedEl)  testProfile.profile.married   = marriedEl.value;
  if (hasChildEl) testProfile.profile.has_child = hasChildEl.value;
  if (drivesEl)   testProfile.profile.drives    = drivesEl.value;

  // 나이 배지 in-place 업데이트 (age input 포커스 유지)
  document.querySelectorAll('[id^="testProfileBadge_"]').forEach(function(el) {
    var key   = el.id.replace('testProfileBadge_', '');
    var parts = key.split('_');
    var idx   = parseInt(parts[parts.length - 1]);
    var rId   = parts.slice(0, parts.length - 1).join('_');
    var cond  = ((CARD_DETAILS[rId] || {}).conditions || [])[idx];
    if (!cond || cond.source !== 'PROFILE') return;
    var age = testProfile.profile.age;
    var met;
    if (cond.op === 'BETWEEN') {
      var bps = cond.value.split(',');
      met = age >= parseInt(bps[0]) && age <= parseInt(bps[1]);
    } else {
      var val = parseInt(cond.value);
      met = cond.op === 'GTE' ? age >= val : cond.op === 'LTE' ? age <= val
          : cond.op === 'GT'  ? age >  val : cond.op === 'LT'  ? age <  val : false;
    }
    el.className  = 'test-auto-badge ' + (met ? 'ok' : 'fail');
    el.textContent = (met ? '✓ 충족' : '✗ 미충족') + ' (현재 ' + age + '세)';
  });

  // 성별 배지 in-place 업데이트
  document.querySelectorAll('[id^="testGenderBadge_"]').forEach(function(el) {
    var key   = el.id.replace('testGenderBadge_', '');
    var parts = key.split('_');
    var idx   = parseInt(parts[parts.length - 1]);
    var rId   = parts.slice(0, parts.length - 1).join('_');
    var cond  = ((CARD_DETAILS[rId] || {}).conditions || [])[idx];
    if (!cond || cond.source !== 'PROFILE') return;
    var gender = testProfile.profile.gender;
    var met    = cond.op === 'EQ' ? gender === cond.value : false;
    el.className  = 'test-auto-badge ' + (met ? 'ok' : 'fail');
    el.textContent = (met ? '✓ 충족' : '✗ 미충족') + ' (현재 ' + gender + '성)';
  });

  // 결혼여부 배지 in-place 업데이트
  document.querySelectorAll('[id^="testMarriedBadge_"]').forEach(function(el) {
    var key   = el.id.replace('testMarriedBadge_', '');
    var parts = key.split('_');
    var idx   = parseInt(parts[parts.length - 1]);
    var rId   = parts.slice(0, parts.length - 1).join('_');
    var cond  = ((CARD_DETAILS[rId] || {}).conditions || [])[idx];
    if (!cond || cond.source !== 'PROFILE') return;
    var marriedCur = testProfile.profile.married || '무관';
    var met = cond.op === 'EQ' ? (marriedCur === cond.value || marriedCur === '무관') : false;
    el.className   = 'test-auto-badge ' + (met ? 'ok' : 'fail');
    el.textContent = (met ? '✓ 충족' : '✗ 미충족') + ' (현재 ' + marriedCur + ')';
  });

  // 자녀유무 배지 in-place 업데이트
  document.querySelectorAll('[id^="testHasChildBadge_"]').forEach(function(el) {
    var key   = el.id.replace('testHasChildBadge_', '');
    var parts = key.split('_');
    var idx   = parseInt(parts[parts.length - 1]);
    var rId   = parts.slice(0, parts.length - 1).join('_');
    var cond  = ((CARD_DETAILS[rId] || {}).conditions || [])[idx];
    if (!cond || cond.source !== 'PROFILE') return;
    var hasChildCur = testProfile.profile.has_child || '무관';
    var met = cond.op === 'EQ' ? (hasChildCur === cond.value || hasChildCur === '무관') : false;
    el.className   = 'test-auto-badge ' + (met ? 'ok' : 'fail');
    el.textContent = (met ? '✓ 충족' : '✗ 미충족') + ' (현재 ' + hasChildCur + ')';
  });

  // 운전여부 배지 in-place 업데이트
  document.querySelectorAll('[id^="testDrivesBadge_"]').forEach(function(el) {
    var key   = el.id.replace('testDrivesBadge_', '');
    var parts = key.split('_');
    var idx   = parseInt(parts[parts.length - 1]);
    var rId   = parts.slice(0, parts.length - 1).join('_');
    var cond  = ((CARD_DETAILS[rId] || {}).conditions || [])[idx];
    if (!cond || cond.source !== 'PROFILE') return;
    var drivesCur = testProfile.profile.drives || '무관';
    var met = cond.op === 'EQ' ? (drivesCur === cond.value || drivesCur === '무관') : false;
    el.className  = 'test-auto-badge ' + (met ? 'ok' : 'fail');
    el.textContent = (met ? '✓ 충족' : '✗ 미충족') + ' (현재 ' + drivesCur + ')';
  });

  var ruleId   = testChain.rule;
  var ruleCard = ruleId ? CARDS.find(function(c) { return c.id === ruleId; }) : null;
  updateTestSummary(ruleCard);
  var ra = document.getElementById('testResultArea');
  if (ra) ra.innerHTML = '';
}

function updateTestSummary(ruleCard) {
  var chips = [];
  var p = testProfile.profile;
  chips.push('<span class="test-sum-chip" style="background:#EEF4FF;color:#1A3A6B">' + p.age + '세 ' + p.gender + '성</span>');
  if (ruleCard) {
    var conds = (CARD_DETAILS[ruleCard.id] || {}).conditions || [];
    var gLbl  = {risk:'위험', caution:'주의', good:'양호'};
    var gCol  = {risk:'rgba(163,45,45,.12)', caution:'rgba(186,117,23,.12)', good:'rgba(15,110,86,.1)'};
    var gFg   = {risk:'#A32D2D', caution:'#BA7517', good:'#0F6E56'};
    conds.forEach(function(cond, i) {
      var key = ruleCard.id + '_' + i;
      if (cond.source === 'MYDATA') {
        var met = testProfile.conditions[key] !== false;
        chips.push('<span class="test-sum-chip" style="background:' +
          (met ? 'rgba(15,110,86,.1)' : 'rgba(201,75,26,.08)') + ';color:' + (met ? '#0F6E56' : '#C94B1A') + '">' +
          (met ? '✓ ' : '✗ ') + cond.sourceLabel + (cond.required ? ' 필수' : '') + '</span>');
      } else if (cond.source === 'PROMAGE') {
        var pmet = testProfile.conditions[key] !== false;
        chips.push('<span class="test-sum-chip" style="background:' +
          (pmet ? 'rgba(15,110,86,.1)' : 'rgba(201,75,26,.08)') + ';color:' + (pmet ? '#0F6E56' : '#C94B1A') + '">' +
          (pmet ? '✓ ' : '✗ ') + cond.sourceLabel + (cond.required ? ' 필수' : '') + '</span>');
      } else if (cond.source === 'PROFILE') {
        var met2;
        if (cond.op === 'IN') {
          met2 = true;
        } else if (cond.op === 'EQ' && (cond.value === '남' || cond.value === '여')) {
          met2 = p.gender === cond.value;
        } else if (cond.op === 'EQ' && (cond.value === '기혼' || cond.value === '미혼')) {
          var mc = p.married || '무관';
          met2 = mc === cond.value || mc === '무관';
        } else if (cond.op === 'EQ' && (cond.value === '있음' || cond.value === '없음')) {
          var hc = p.has_child || '무관';
          met2 = hc === cond.value || hc === '무관';
        } else if (cond.op === 'EQ' && (cond.value === '유' || cond.value === '무')) {
          var dc = p.drives || '무관';
          met2 = dc === cond.value || dc === '무관';
        } else if (cond.op === 'BETWEEN') {
          var bps2 = cond.value.split(',');
          met2 = p.age >= parseInt(bps2[0]) && p.age <= parseInt(bps2[1]);
        } else {
          var val = parseInt(cond.value);
          met2 = cond.op === 'GTE' ? p.age >= val : cond.op === 'LTE' ? p.age <= val : false;
        }
        var condLabel2 = cond.op === 'IN' ? '성별 무관'
          : (cond.value === '남' || cond.value === '여') ? '성별 조건'
          : (cond.value === '기혼' || cond.value === '미혼') ? '결혼여부 조건'
          : (cond.value === '있음' || cond.value === '없음') ? '자녀유무 조건'
          : (cond.value === '유' || cond.value === '무') ? '운전여부 조건'
          : '나이 조건';
        chips.push('<span class="test-sum-chip" style="background:' +
          (met2 ? 'rgba(15,110,86,.1)' : 'rgba(201,75,26,.08)') + ';color:' + (met2 ? '#0F6E56' : '#C94B1A') + '">' +
          (met2 ? '✓ ' : '✗ ') + condLabel2 + '</span>');
      }
    });
  }
  var el = document.getElementById('testSummaryChips');
  if (el) el.innerHTML = chips.join('');
}

function evaluateTestResult() {
  var ruleId   = testChain.rule;
  var ruleCard = ruleId ? CARDS.find(function(c) { return c.id === ruleId; }) : null;
  if (!ruleCard) return {pass: true, failed: []};
  var conds  = (CARD_DETAILS[ruleCard.id] || {}).conditions || [];
  var failed = [];
  var gMap   = {'위험':'risk','주의':'caution','양호':'good'};
  conds.forEach(function(cond, i) {
    if (!cond.required) return;
    var key = ruleCard.id + '_' + i;
    var met = false;
    if (cond.source === 'PROFILE') {
      if (cond.op === 'IN') {
        met = true;
      } else if (cond.op === 'EQ' && (cond.value === '남' || cond.value === '여')) {
        met = testProfile.profile.gender === cond.value;
      } else if (cond.op === 'EQ' && (cond.value === '기혼' || cond.value === '미혼')) {
        var mc2 = testProfile.profile.married || '무관';
        met = mc2 === cond.value || mc2 === '무관';
      } else if (cond.op === 'EQ' && (cond.value === '있음' || cond.value === '없음')) {
        var hc2 = testProfile.profile.has_child || '무관';
        met = hc2 === cond.value || hc2 === '무관';
      } else if (cond.op === 'EQ' && (cond.value === '유' || cond.value === '무')) {
        var dc2 = testProfile.profile.drives || '무관';
        met = dc2 === cond.value || dc2 === '무관';
      } else if (cond.op === 'BETWEEN') {
        var bps3 = cond.value.split(',');
        met = testProfile.profile.age >= parseInt(bps3[0]) && testProfile.profile.age <= parseInt(bps3[1]);
      } else {
        var age = testProfile.profile.age;
        var val = parseInt(cond.value);
        met = cond.op === 'GTE' ? age >= val : cond.op === 'LTE' ? age <= val
            : cond.op === 'GT'  ? age >  val : cond.op === 'LT'  ? age <  val : false;
      }
    } else if (cond.source === 'PROMAGE') {
      met = testProfile.conditions[key] !== false;
    } else {
      met = testProfile.conditions[key] !== false;
    }
    if (!met) failed.push('[' + cond.sourceLabel + '] ' + cond.label);
  });
  return {pass: failed.length === 0, failed: failed};
}

// DRAW LINES — SVG overlay on grid-cols
// ============================================================
function drawLines() {
  const gridCols = document.getElementById('gridCols');
  const old = document.getElementById('connectionSvg');
  if (old) old.remove();
  if (!selectedCardId) return;

  const chain = computeChain(selectedCardId);
  const containerRect = gridCols.getBoundingClientRect();

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = 'connectionSvg';
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;overflow:visible';

  // Arrowhead markers
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const markerDefs = [
    {id:'arr-active',  color:'#0F6E56'},
    {id:'arr-pending', color:'#1A4A9A'},
  ];
  markerDefs.forEach(m => {
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', m.id);
    marker.setAttribute('markerWidth', '7');
    marker.setAttribute('markerHeight', '7');
    marker.setAttribute('refX', '5');
    marker.setAttribute('refY', '3.5');
    marker.setAttribute('orient', 'auto');
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', 'M0,0.5 L0,6.5 L6,3.5 Z');
    p.setAttribute('fill', m.color);
    marker.appendChild(p);
    defs.appendChild(marker);
  });
  svg.appendChild(defs);

  // Draw each edge whose both endpoints are in the current chain
  EDGES.forEach(edge => {
    if (!chain.has(edge.from) || !chain.has(edge.to)) return;

    const fromEl = gridCols.querySelector('[data-card-id="' + edge.from + '"]');
    const toEl   = gridCols.querySelector('[data-card-id="' + edge.to   + '"]');
    if (!fromEl || !toEl) return;

    const fr = fromEl.getBoundingClientRect();
    const tr = toEl.getBoundingClientRect();

    // Positions relative to gridCols top-left
    const x1 = fr.right  - containerRect.left + 4;
    const y1 = fr.top + fr.height / 2 - containerRect.top;
    const x2 = tr.left   - containerRect.left - 4;
    const y2 = tr.top + tr.height / 2 - containerRect.top;

    const color    = edge.status === 'active' ? '#0F6E56' : '#1A4A9A';
    const markerId = edge.status === 'active' ? 'arr-active' : 'arr-pending';
    const dash     = edge.status === 'pending' ? '6,4' : 'none';

    // Focal-card edges are slightly bolder
    const isFocal   = edge.from === selectedCardId || edge.to === selectedCardId;
    const strokeW   = '2';
    const opacity   = isFocal ? '0.9' : '0.55';

    // Orthogonal routing: right → vertical → right (L-shape)
    const midX = x1 + (x2 - x1) * 0.5;
    let d;
    if (Math.abs(y1 - y2) < 3) {
      d = 'M' + x1 + ',' + y1 + ' L' + x2 + ',' + y2;
    } else {
      d = 'M' + x1 + ',' + y1 +
          ' L' + midX + ',' + y1 +
          ' L' + midX + ',' + y2 +
          ' L' + x2   + ',' + y2;
    }

    const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    pathEl.setAttribute('d', d);
    pathEl.setAttribute('fill', 'none');
    pathEl.setAttribute('stroke', color);
    pathEl.setAttribute('stroke-width', strokeW);
    pathEl.setAttribute('stroke-dasharray', dash);
    pathEl.setAttribute('marker-end', 'url(#' + markerId + ')');
    pathEl.setAttribute('opacity', opacity);
    svg.appendChild(pathEl);
  });

  gridCols.appendChild(svg);
}
