    var imp = detail.importance==='high'?'높음':detail.importance==='low'?'낮음':'보통';
    var ic  = detail.importance==='high'?'#C94B1A':detail.importance==='low'?'#1A7A4A':'#BA7517';
    var impDesc = detail.importance==='high'?'핵심 — 동시 감지 시 선노출':detail.importance==='low'?'보조 — 상위 유형 노출 후 후순위':'기본값 (미설정 시 자동 적용)';
    html += '<div class="detail-field"><div class="detail-label">중요도</div>' +
      '<span style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:6px;font-size:13px;font-weight:700;color:'+ic+';background:'+hexToRgba(ic,0.1)+'">'+imp+
      '<span style="font-weight:400;font-size:12px;color:var(--text-secondary)">'+impDesc+'</span></span></div>';
  }

  // ── Evidence ────────────────────────────────
  else if (card.type === 'evidence') {
    var orgMap = {HIRA:'건강보험심사평가원 (HIRA)',NHIS:'국민건강보험공단 (NHIS)',KOSTAT:'통계청',FSS:'금융감독원 (FSS)'};
    html += roField('제목', card.title);
    html += roField('출처 기관', orgMap[detail.org] || detail.org || '—');
    html += roField('보고서명', detail.report);
    html += roField('기준 연도', detail.year);
    html += roField('지표명', detail.indicator);
    html += roField('기준값', detail.value);
    if (detail.url) {
      html += '<div class="detail-field"><div class="detail-label">출처 URL <span style="font-weight:400;color:var(--text-hint)">(선택)</span></div>' +
        '<a href="'+detail.url+'" target="_blank" style="color:var(--step-active);font-size:13px;word-break:break-all">'+detail.url+'</a></div>';
    } else {
      html += roField('출처 URL (선택)', '—');
    }
    html += roField('활용 방법', detail.usage);
  }

  // ── Concept ────────────────────────────────
  else if (card.type === 'concept') {
    html += detailSection('Card ① 기본정보');
    html += roField('용어명', card.title);
    if (detail.synonyms && detail.synonyms.length) {
      var chips = detail.synonyms.map(function(s){
        return '<span style="display:inline-flex;background:'+hexToRgba(color,0.08)+';border:1px solid '+hexToRgba(color,0.25)+';border-radius:4px;padding:3px 9px;font-size:12px;font-weight:600;color:'+color+';margin:2px">'+s+'</span>';
      }).join('');
      html += '<div class="detail-field"><div class="detail-label">동의어 <span style="font-weight:400;color:var(--text-hint)">('+detail.synonyms.length+'개)</span></div><div style="display:flex;flex-wrap:wrap;margin-top:4px">'+chips+'</div></div>';
    } else {
      html += roField('동의어', '—');
    }
    html += roField('한 줄 정의 (선택)', detail.definition || '—');

    html += detailSection('Card ② Risk-type 연결 <span style="font-size:11px;font-weight:400;color:var(--text-hint)">읽기 전용</span>');
    var outRisk = EDGES.filter(function(e){ return e.from===cardId; }).map(function(e){ return CARDS.find(function(c){ return c.id===e.to; }); }).filter(Boolean);
    if (outRisk.length) {
      var rbadges = outRisk.map(function(c){ return '<span style="display:inline-flex;gap:4px;padding:3px 9px;border-radius:4px;font-size:12px;font-weight:700;background:rgba(201,75,26,.1);color:#C94B1A;margin:2px;cursor:pointer" onclick="selectCard(\''+c.id+'\');closePanel()">'+c.id+' '+c.title+'</span>'; }).join('');
      html += '<div class="detail-field"><div style="display:flex;flex-wrap:wrap;margin-top:2px">'+rbadges+'</div></div>';
    } else {
      html += '<div style="padding:10px 12px;background:rgba(201,75,26,.04);border:1px dashed rgba(201,75,26,.3);border-radius:6px;font-size:12px;color:#C94B1A;margin-bottom:14px">⚠ 연결된 Risk-type이 없습니다. KC 체인에 진입하지 않습니다.</div>';
    }
  }

  // ── Rule ────────────────────────────────────
  else if (card.type === 'rule') {
    html += detailSection('기본 정보');
    html += roField('Rule 이름', card.title);
    html += roField('Clark 경고 메시지 (선택)', detail.warningMsg || '—');

    var rtConn = EDGES.filter(function(e){ return e.to===cardId; }).map(function(e){ return CARDS.find(function(c){ return c.id===e.from&&c.type==='risk'; }); }).filter(Boolean); // 1:1 정책 — 최대 1개
    html += '<div class="detail-field"><div class="detail-label">Risk-type 연결 <span style="font-weight:400;color:var(--text-hint)">읽기 전용</span></div>';
    if (rtConn.length) {
      html += '<div style="display:flex;flex-wrap:wrap;margin-top:4px">'+rtConn.map(function(c){ return '<span style="display:inline-flex;gap:4px;padding:3px 9px;border-radius:4px;font-size:12px;font-weight:700;background:rgba(201,75,26,.1);color:#C94B1A;margin:2px">'+c.id+' '+c.title+'</span>'; }).join('')+'</div>';
    } else {
      html += '<span style="font-size:12px;color:var(--text-hint)">연결 없음</span>';
    }
    html += '</div>';

    if (detail.conditions && detail.conditions.length) {
      html += detailSection('② 판단 조건');
      var condH = detail.conditions.map(function(c){
        var sc = SOURCE_COLORS[c.source]||'#888';
        var req = c.required
          ? '<span style="font-size:10px;font-weight:700;color:#C94B1A;background:rgba(201,75,26,.1);padding:1px 5px;border-radius:3px">필수</span>'
          : '<span style="font-size:10px;font-weight:700;color:var(--text-secondary);background:var(--bg-page);padding:1px 5px;border-radius:3px;border:1px solid var(--border)">선택</span>';
        return '<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:'+hexToRgba(sc,0.05)+';border:1px solid '+hexToRgba(sc,0.2)+';border-radius:6px;margin-bottom:4px">' +
          '<span style="font-size:10px;font-weight:700;color:'+sc+';flex-shrink:0;padding-top:2px;min-width:52px">'+c.sourceLabel+'</span>' +
          '<span style="font-size:12px;flex:1;line-height:1.5">'+c.label+'</span>'+req+'</div>';
      }).join('');
      html += '<div class="detail-field">'+condH+'</div>';
    }

    html += detailSection('③ Evidence 연결 <span style="font-size:11px;font-weight:400;color:var(--text-hint)">읽기 전용</span>');
    var evConn = EDGES.filter(function(e){ return e.from===cardId; }).map(function(e){ return CARDS.find(function(c){ return c.id===e.to&&c.type==='evidence'; }); }).filter(Boolean);
    if (evConn.length) {
      html += '<div class="detail-field"><div style="display:flex;flex-wrap:wrap;margin-top:2px">'+evConn.map(function(c){ return '<span style="display:inline-flex;gap:4px;padding:3px 9px;border-radius:4px;font-size:12px;font-weight:700;background:rgba(26,122,74,.1);color:#1A7A4A;margin:2px">'+c.id+' '+c.title+'</span>'; }).join('')+'</div></div>';
    } else {
      html += '<div class="detail-field"><span style="font-size:12px;color:var(--text-hint)">연결 없음</span></div>';
    }

  }

  // ── Policy ──────────────────────────────────
  else if (card.type === 'policy') {
    html += detailSection('Policy 정보');
    html += roField('Policy 이름', detail.name||card.title);
    html += roField('Clark 앱 표시 문구', detail.appDisplayText);

    html += detailSection('Rule 연결 <span style="font-size:11px;font-weight:400;color:var(--text-hint)">읽기 전용</span>');
    var ruleConn = EDGES.filter(function(e){ return e.to===cardId; }).map(function(e){ return CARDS.find(function(c){ return c.id===e.from&&c.type==='rule'; }); }).filter(Boolean);
    if (ruleConn.length) {
      html += '<div class="detail-field"><div style="display:flex;flex-wrap:wrap;margin-top:2px">'+ruleConn.map(function(c){ return '<span style="display:inline-flex;gap:4px;padding:3px 9px;border-radius:4px;font-size:12px;font-weight:700;background:rgba(154,26,26,.1);color:#9A1A1A;margin:2px">'+c.id+' '+c.title+'</span>'; }).join('')+'</div></div>';
    } else {
      html += '<div class="detail-field"><span style="font-size:12px;color:var(--text-hint)">연결 없음</span></div>';
    }
  }

  // ── Playbook ────────────────────────────────
  else if (card.type === 'playbook') {
    html += detailSection('기본정보');
    html += roField('Playbook 명칭', card.title);
    html += roField('설명', detail.description);

    html += '<div style="padding:10px 12px;background:rgba(107,74,154,.06);border:1px solid rgba(107,74,154,.2);border-radius:6px;font-size:12px;color:#6B4A9A;margin-bottom:18px">' +
      '<i class="fa-solid fa-circle-info" style="margin-right:5px"></i>Playbook은 다른 카드와 직접 연결되지 않습니다. 독립 체인으로 동작합니다.</div>';

    html += detailSection('① 리드 전환 레이어');
    if (detail.keywords && detail.keywords.length) {
      var kw = detail.keywords.map(function(k){ return '<span style="display:inline-flex;background:'+hexToRgba(color,0.08)+';border:1px solid '+hexToRgba(color,0.25)+';border-radius:4px;padding:3px 9px;font-size:12px;font-weight:600;color:'+color+';margin:2px">'+k+'</span>'; }).join('');
      html += '<div class="detail-field"><div class="detail-label">전환 발화 키워드 <span style="font-weight:400;color:var(--text-hint)">('+detail.keywords.length+'개 · 최소 3개)</span></div><div style="display:flex;flex-wrap:wrap;margin-top:4px">'+kw+'</div></div>';
    }
    if (detail.actions && detail.actions.length) {
      var acH = detail.actions.map(function(a){ return '<div style="display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--bg-page);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;font-size:13px"><span style="font-weight:700">'+a.label+'</span>'+(a.required?'<span style="font-size:10px;font-weight:700;color:#C94B1A;background:rgba(201,75,26,.1);padding:1px 5px;border-radius:3px">기본 필수</span>':'')+'</div>'; }).join('');
      html += '<div class="detail-field"><div class="detail-label">전환 액션 설정</div><div style="margin-top:6px">'+acH+'</div></div>';
    }
    html += roField('Standalone 답변 가이드 (선택)', detail.standalone||'—');

    html += detailSection('② 리드 스코어링 레이어');
    html += '<div style="padding:10px 12px;background:#F4F0FF;border:1px solid #D0C0F0;border-radius:6px;font-size:12px;color:#6B4A9A;margin-bottom:18px">' +
      '<span style="font-size:10px;font-weight:700;background:#EDE8F5;border:1px solid #C8B0E8;border-radius:4px;padding:1px 7px;margin-right:6px">Phase 1.5 이관</span>' +
      'GA 수신 스펙 확정 후 활성화 예정</div>';

    html += detailSection('③ 배정 최적화 레이어');
    html += '<div style="padding:10px 12px;background:#F4F4F2;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-hint);margin-bottom:14px">' +
      '🔒 Phase 2 예정 — 원수사·GA API 연동 확정 후 구성</div>';
  }

  return html;
}

function detailSection(title) {
  return '<div style="font-size:11px;font-weight:700;color:var(--text-secondary);letter-spacing:.05em;text-transform:uppercase;padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:12px;margin-top:4px">'+title+'</div>';
}

// ============================================================
// MODAL BACKDROP CLICK
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  init();
  updateDeployBar();
  document.getElementById('actionModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
});
</script>
</body>
</html>
