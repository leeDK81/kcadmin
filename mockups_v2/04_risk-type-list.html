<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Risk-type 카드 목록 — KC Admin</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.filter-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.filter-tabs{display:flex;gap:4px}
.filter-tab{padding:6px 14px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-secondary);font-family:inherit}
.filter-tab.active{background:var(--step-active);color:#fff}
.filter-tab:hover:not(.active){background:#F0F0EC}
.list-table{width:100%;border-collapse:collapse;table-layout:fixed;background:var(--bg-card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.list-table th{background:#F0F0EC;padding:10px 16px;text-align:left;font-size:13px;font-weight:700;color:var(--text-secondary);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden}
.list-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
.list-table tr:last-child td{border-bottom:none}
.list-table tr.card-row:hover td{background:#FAFAF8;cursor:pointer}
.cell-code{font-size:12px;font-weight:700;color:var(--text-hint);margin-bottom:1px}
.cell-name{font-weight:600;overflow:hidden;white-space:nowrap}
.cell-date{color:var(--text-hint);font-size:13px;white-space:nowrap}
.rule-tag{display:inline-block;padding:2px 7px;background:rgba(154,26,26,.1);border-radius:4px;font-size:12px;color:#9A1A1A;font-weight:600;margin:1px}
.conn-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600;white-space:nowrap;margin:0 4px 0 0}
.chip-concept{background:rgba(26,74,154,.1);color:#1A4A9A}
.chip-rule{background:rgba(154,26,26,.1);color:#9A1A1A}
.pri-high{background:rgba(201,75,26,.12);color:#A32D2D;display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;white-space:nowrap}
.pri-mid{background:rgba(186,117,23,.12);color:#BA7517;display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;white-space:nowrap}
.pri-low{background:rgba(156,156,148,.15);color:#9C9C94;display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;white-space:nowrap}
.conn-label{font-size:11px;color:var(--text-hint);font-weight:600;letter-spacing:.04em;display:block;margin-bottom:2px}
.empty-row td{text-align:center;padding:48px;color:var(--text-hint)}
</style>
</head>
<body>
<div class="layout">
<nav class="sidebar" id="sidebar"></nav>
<main class="main">
  <div class="page-header">
    <h1>① Risk-type 카드 목록</h1>
    <p>Clark AI의 리스크 유형 분류 기준 카드 · <a href="01_guide.html" style="color:var(--step-active);font-size:13px;text-decoration:none">업무 가이드 →</a></p>
  </div>

  <div class="guide-box">
    <strong>Risk-type 카드</strong>는 Clark AI가 보험 리스크를 분류하는 기준 카드입니다. Concept·Rule 카드가 이 카드를 참조해 KC 체인을 구성합니다.
  </div>

  <div class="filter-bar">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filter('all',this)">전체 <span id="c-all"></span></button>
      <button class="filter-tab" onclick="filter('active',this)">🟢 라이브 <span id="c-active"></span></button>
      <button class="filter-tab" onclick="filter('approved',this)">✔ 승인완료 <span id="c-approved"></span></button>
      <button class="filter-tab" onclick="filter('review',this)">⏳ 검수중 <span id="c-review"></span></button>
      <button class="filter-tab" onclick="filter('draft',this)">📝 임시저장 <span id="c-draft"></span></button>
      <button class="filter-tab" onclick="filter('paused',this)">⏸ 일시중지 <span id="c-paused"></span></button>
      <button class="filter-tab" onclick="filter('rejected',this)">🚫 반려 <span id="c-rejected"></span></button>
    </div>
    <a href="04_card-editor-risk-type.html" class="btn btn-primary"><i class="fa fa-plus"></i> 신규 등록</a>
  </div>

  <table class="list-table">
    <thead>
      <tr>
        <th style="width:130px">상태</th>
        <th style="width:200px">코드 · 명칭</th>
        <th style="width:80px">중요도</th>
        <th>설명</th>
        <th style="width:160px">연결</th>
        <th style="width:110px">수정일</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>
</div>
<script src="shared.js"></script>
<script>
renderSidebar(); // shared.js: 사이드바 렌더링 + 토스트 주입
const DATA = [
  {code:'T01',name:'무보장형',status:'active',priority:'high',concepts:2,desc:'어떤 보장 담보도 없는 순수 저축·사망보험 보유자',rule:'RU006 무보장 기본 판정',updated:'2026-05-10'},
  {code:'T02',name:'암투병생활비 부족형',status:'active',priority:'high',concepts:1,desc:'암 진단금 담보 없음 또는 소액 보유자',rule:'RU001 암진단금 미보유 또는 소액',updated:'2026-05-14'},
  {code:'T03',name:'심혈관질환보장 협소형',status:'review',priority:'high',concepts:1,desc:'심혈관 관련 담보 미보유 또는 보장 범위 협소',rule:'RU003 심혈관 보장 미흡',updated:'2026-05-12'},
  {code:'T04',name:'뇌혈관질환보장 협소형',status:'active',priority:'high',concepts:1,desc:'뇌혈관 관련 담보 미보유 또는 보장 범위 협소',rule:'RU002 뇌혈관 보장 범위 협소',updated:'2026-05-10'},
  {code:'T05',name:'노후돌봄보장 공백형',status:'draft',priority:'mid',concepts:1,desc:'노후 간병·요양 관련 담보 부재 또는 미흡',rule:null,updated:'2026-05-08'},
  {code:'T06',name:'납입여력부족 우려형',status:'draft',priority:'mid',concepts:1,desc:'소득 대비 보험료 납입 부담이 과도한 상태',rule:null,updated:'2026-05-08'},
  {code:'T07',name:'비용 대비 보장 비효율형',status:'draft',priority:'low',concepts:0,desc:'납입 보험료 대비 실질 보장 가치가 낮은 상태',rule:null,updated:'2026-05-08'},
  {code:'T08',name:'생애주기 적합도 저조형',status:'draft',priority:'low',concepts:0,desc:'지금 나이나 상황에 맞지 않는 보장을 가진 고객',rule:null,updated:'2026-05-08'},
  {code:'T09',name:'단기납 만기 후 공백형',status:'approved',priority:'mid',concepts:0,desc:'단기납 보험 만기 후 갱신·전환 보장이 없는 상태',rule:'RU010 단기납 만기 후 공백',updated:'2026-05-15'},
  {code:'T10',name:'고액 보험료 유지 부담형',status:'paused',priority:'mid',concepts:0,desc:'시장 기준 개정으로 재정의 중인 유형 — 운영 일시중지',rule:null,updated:'2026-05-16'},
  {code:'T11',name:'실손보장 중복 가입형',status:'rejected',priority:'low',concepts:0,desc:'실손보험 중복 가입으로 판정 기준 재검토 필요 — 반려됨',rule:null,updated:'2026-05-20'},
];
const ST={active:'🟢 라이브',review:'⏳ 승인요청',draft:'📝 임시저장',approved:'✔ 승인완료',paused:'⏸ 일시중지',rejected:'🚫 반려'};
const PRI={high:{label:'높음',cls:'pri-high'},mid:{label:'보통',cls:'pri-mid'},low:{label:'낮음',cls:'pri-low'}};

let cur='all';
function filter(s,btn){cur=s;document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');render();}
function render(){
  const rows=cur==='all'?DATA:DATA.filter(d=>d.status===cur);
  const tb=document.getElementById('tbody');
  tb.innerHTML=rows.length?rows.map(d=>{
    const conceptChip = d.concepts > 0 ? `<span class="conn-chip chip-concept">Concept ${d.concepts}</span>` : '';
    const ruleChip = d.rule ? `<span class="conn-chip chip-rule">Rule 연결됨</span>` : '';
    const ruleCell = (conceptChip || ruleChip) ? (conceptChip + ruleChip) : `<span style="color:var(--text-hint);font-size:13px">—</span>`;
    const p=PRI[d.priority||'mid'];
    return `
    <tr class="card-row" onclick="location.href='04_card-editor-risk-type.html'">
      <td><span class="badge badge-${d.status}">${ST[d.status]}</span></td>
      <td><div class="cell-code">${d.code}</div><div class="cell-name" title="${d.name}">${d.name}</div></td>
      <td><span class="${p.cls}">${p.label}</span></td>
      <td style="max-width:0"><div style="overflow:hidden;white-space:nowrap;color:var(--text-secondary);font-size:13px" title="${d.desc}">${d.desc}</div></td>
      <td>${ruleCell}</td>
      <td class="cell-date">${d.updated}</td>
    </tr>`;
  }).join('')
    :`<tr class="empty-row"><td colspan="6">해당 상태의 카드가 없습니다</td></tr>`;
  const cnt={all:DATA.length,active:0,review:0,approved:0,draft:0,paused:0,rejected:0};
  DATA.forEach(d=>{if(cnt[d.status]!==undefined)cnt[d.status]++;});
  ['all','active','review','approved','draft','paused','rejected'].forEach(k=>{const el=document.getElementById('c-'+k);if(el)el.textContent=cnt[k]});
}
render();
</script>
</body>
</html>
