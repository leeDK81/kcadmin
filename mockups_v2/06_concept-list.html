<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Concept 카드 목록 — KC Admin</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.filter-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.filter-tabs{display:flex;gap:4px}
.filter-tab{padding:6px 14px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-secondary);font-family:inherit}
.filter-tab.active{background:var(--step-active);color:#fff}
.filter-tab:hover:not(.active){background:#F0F0EC}
.list-table{width:100%;border-collapse:collapse;table-layout:fixed;background:var(--bg-card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.list-table th{background:#F0F0EC;padding:10px 16px;text-align:left;font-size:13px;font-weight:700;color:var(--text-secondary);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden}
.list-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
.list-table tr:last-child td{border-bottom:none}
.list-table tr.card-row:hover td{background:#FAFAF8;cursor:pointer}
.cell-code{font-size:12px;font-weight:700;color:var(--text-hint);margin-bottom:1px}
.cell-name{font-weight:600;overflow:hidden;white-space:nowrap}
.cell-date{color:var(--text-hint);font-size:13px;white-space:nowrap}
.synonym-chip{display:inline-block;padding:1px 6px;background:#F0F0EC;border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--text-secondary);margin:1px;white-space:nowrap}
.empty-row td{text-align:center;padding:48px;color:var(--text-hint)}
.warn-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#A32D2D;font-weight:600}
.conn-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600;white-space:nowrap;margin:0 4px 0 0}
.chip-risk{background:rgba(201,75,26,.1);color:#C94B1A}
.chip-req{background:#FFF0ED;border:1px solid #C94B1A;color:#C94B1A;font-weight:700}
</style>
</head>
<body>
<div class="layout">
<nav class="sidebar" id="sidebar"></nav>
<main class="main">
  <div class="page-header">
    <h1>③ Concept 카드 목록</h1>
    <p>동의어 매칭 기반 AI 답변 경로 입구 카드 · <a href="01_guide.html" style="color:var(--step-active);font-size:13px;text-decoration:none">업무 가이드 →</a></p>
  </div>

  <div class="guide-box">
    <strong>Concept 카드</strong>는 사용자 질문의 핵심 단어를 동의어로 매칭해 Risk-type 체인으로 연결하는 입구 카드입니다. 동의어가 없으면 KC 기반 답변이 불가합니다.
  </div>

  <div class="filter-bar">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filter('all',this)">전체 <span id="c-all"></span></button>
      <button class="filter-tab" onclick="filter('active',this)">🟢 라이브 <span id="c-active"></span></button>
      <button class="filter-tab" onclick="filter('approved',this)">✔ 승인완료 <span id="c-approved"></span></button>
      <button class="filter-tab" onclick="filter('review',this)">⏳ 승인요청 <span id="c-review"></span></button>
      <button class="filter-tab" onclick="filter('draft',this)">📝 임시저장 <span id="c-draft"></span></button>
      <button class="filter-tab" onclick="filter('paused',this)">⏸ 일시중지 <span id="c-paused"></span></button>
      <button class="filter-tab" onclick="filter('rejected',this)">🚫 반려 <span id="c-rejected"></span></button>
    </div>
    <a href="06_card-editor-concept.html" class="btn btn-primary"><i class="fa fa-plus"></i> 신규 등록</a>
  </div>

  <table class="list-table">
    <thead>
      <tr>
        <th style="width:130px">상태</th>
        <th style="width:190px">코드 · 명칭</th>
        <th style="width:100px">공개범위</th>
        <th>대표 동의어</th>
        <th style="width:110px">연결</th>
        <th style="width:100px;text-align:center">동의어수</th>
        <th style="width:100px">수정일</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>
</div>
<script src="shared.js"></script>
<script>
renderSidebar();
const DATA=[
  {code:'CO001',name:'암진단',status:'active',synonyms:['암','암진단','cancer','악성종양','암 진단'],riskTypes:['T02 암투병생활비 부족형','T01 무보장형'],updated:'2026-05-14'},
  {code:'CO002',name:'뇌졸중',status:'draft',synonyms:[],riskTypes:['T04 뇌혈관질환보장 협소형'],updated:'2026-05-08'},
  {code:'CO003',name:'심장마비',status:'draft',synonyms:[],riskTypes:['T03 심혈관질환보장 협소형'],updated:'2026-05-08'},
  {code:'CO004',name:'무보장',status:'active',synonyms:['보험없음','미보장','no coverage'],riskTypes:['T01 무보장형'],updated:'2026-05-10'},
  {code:'CO005',name:'노후간병',status:'approved',synonyms:['요양','간병','노인요양'],riskTypes:['T05 노후돌봄보장 공백형'],updated:'2026-05-15'},
  {code:'CO006',name:'보험료부담',status:'paused',synonyms:[],riskTypes:[],updated:'2026-05-16'},
  {code:'CO007',name:'실손보험',status:'rejected',synonyms:['실비','실손','실비보험'],riskTypes:['T01 무보장형'],updated:'2026-06-20'},
];
const ST={active:'🟢 라이브',review:'⏳ 승인요청',draft:'📝 임시저장',approved:'✔ 승인완료',paused:'⏸ 일시중지',rejected:'🚫 반려'};
let cur='all';

function filter(s,btn){cur=s;document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');render();}
function render(){
  const rows=cur==='all'?DATA:DATA.filter(d=>d.status===cur);
  const tb=document.getElementById('tbody');
  tb.innerHTML=rows.length?rows.map(d=>{
    const chips=d.synonyms.length
      ?d.synonyms.slice(0,3).map(s=>`<span class="synonym-chip">${s}</span>`).join('')+(d.synonyms.length>3?`<span style="font-size:12px;color:var(--text-hint)"> +${d.synonyms.length-3}개</span>`:'')
      :`<span class="warn-tag"><i class="fa fa-triangle-exclamation"></i> 동의어 없음 — Clark AI 매칭 불가</span>`;
    return `
    <tr class="card-row" onclick="location.href='06_card-editor-concept.html'">
      <td><span class="badge badge-${d.status}">${ST[d.status]}</span></td>
      <td><div class="cell-code">${d.code}</div><div class="cell-name" title="${d.name}">${d.name}</div></td>
      <td><span class="badge badge-public">고객 공개</span></td>
      <td>${chips}</td>
      <td>${d.riskTypes.length ? `<span class="conn-chip chip-risk">Risk-type ${d.riskTypes.length}</span>` : `<span style="color:var(--text-hint);font-size:13px">—</span>`}</td>
      <td style="text-align:center">${d.synonyms.length?`<span style="color:var(--step-active);font-weight:600">${d.synonyms.length}개</span>`:'<span style="color:var(--text-hint)">0</span>'}</td>
      <td class="cell-date">${d.updated}</td>
    </tr>`;}).join('')
    :`<tr class="empty-row"><td colspan="7">해당 상태의 카드가 없습니다</td></tr>`;
  const cnt={all:DATA.length,active:0,review:0,draft:0,approved:0,paused:0,rejected:0};
  DATA.forEach(d=>cnt[d.status]++);
  ['all','active','review','draft','approved','paused','rejected'].forEach(k=>{const el=document.getElementById('c-'+k);if(el)el.textContent=cnt[k]});
}
render();
</script>
</body>
</html>
