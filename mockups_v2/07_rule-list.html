<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rule 카드 목록 — KC Admin</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.filter-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.filter-tabs{display:flex;gap:4px}
.filter-tab{padding:6px 14px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-secondary);font-family:inherit}
.filter-tab.active{background:var(--step-active);color:#fff}
.filter-tab:hover:not(.active){background:#F0F0EC}
.list-table{width:100%;border-collapse:collapse;table-layout:fixed;background:var(--bg-card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.list-table th{background:#F0F0EC;padding:10px 16px;text-align:left;font-size:13px;font-weight:700;color:var(--text-secondary);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden}
.list-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
.list-table tr:last-child td{border-bottom:none}
.list-table tr.card-row:hover td{background:#FAFAF8;cursor:pointer}
.cell-code{font-size:12px;font-weight:700;color:var(--text-hint);margin-bottom:1px}
.cell-name{font-weight:600;overflow:hidden;white-space:nowrap}
.cell-date{color:var(--text-hint);font-size:13px;white-space:nowrap}
.ev-tag{display:inline-block;padding:2px 7px;background:rgba(26,122,74,.1);border-radius:4px;font-size:12px;color:#1A7A4A;font-weight:600;margin:1px}
.warn-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#A32D2D;font-weight:600}
.policy-tag{display:inline-block;padding:2px 7px;background:rgba(90,90,85,.1);border-radius:4px;font-size:12px;color:#5A5A55;font-weight:600;margin:1px}
.conn-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600;white-space:nowrap;margin:0 4px 0 0}
.chip-evidence{background:rgba(26,122,74,.1);color:#1A7A4A}
.chip-policy{background:rgba(90,90,85,.1);color:#5A5A55}
.empty-row td{text-align:center;padding:48px;color:var(--text-hint)}
</style>
</head>
<body>
<div class="layout">
<nav class="sidebar" id="sidebar"></nav>
<main class="main">
  <div class="page-header">
    <h1>④ Rule 카드 목록</h1>
    <p>Risk-type 판단 조건 설정 카드 · 마이데이터 · 프롬에이지 · 프로파일 3가지 소스 기반 · <a href="01_guide.html" style="color:var(--step-active);font-size:13px;text-decoration:none">업무 가이드 →</a></p>
  </div>

  <div class="guide-box">
    <strong>Rule 카드</strong>는 마이데이터·프롬에이지·프로파일 3개 소스 기반으로 Risk-type 판정 조건을 정의하는 카드입니다. Evidence와 연결해 판단 근거를 갖춥니다.
  </div>

  <div class="filter-bar">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filter('all',this)">전체 <span id="c-all"></span></button>
      <button class="filter-tab" onclick="filter('active',this)">🟢 라이브 <span id="c-active"></span></button>
      <button class="filter-tab" onclick="filter('approved',this)">✔ 승인완료 <span id="c-approved"></span></button>
      <button class="filter-tab" onclick="filter('review',this)">⏳ 검수중 <span id="c-review"></span></button>
      <button class="filter-tab" onclick="filter('draft',this)">📝 임시저장 <span id="c-draft"></span></button>
      <button class="filter-tab" onclick="filter('paused',this)">⏸ 일시중지 <span id="c-paused"></span></button>
      <button class="filter-tab" onclick="filter('rejected',this)">🚫 반려 <span id="c-rejected"></span></button>
    </div>
    <a href="07_card-editor-rule.html" class="btn btn-primary"><i class="fa fa-plus"></i> 신규 등록</a>
  </div>

  <table class="list-table">
    <thead>
      <tr>
        <th style="width:130px">상태</th>
        <th style="width:200px">코드 · 명칭</th>
        <th style="width:110px">공개범위</th>
        <th style="width:180px">대상 Risk-type</th>
        <th style="width:160px">연결</th>
        <th style="width:100px">수정일</th>
        <th style="width:80px"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>
</div>
<script>
renderSidebar();
const DATA=[
  {code:'RU001',name:'암진단금 미보유 또는 소액',status:'active',scope:'공통 기준',riskType:'T02 암투병생활비 부족형',evidences:['EV001 암 평균 입원 진료비 (심평원 2024)','EV002 암 5년 생존율 (건보공단 2023)'],policies:2,conditions:2,updated:'2026-05-14'},
  {code:'RU002',name:'뇌혈관 보장 범위 협소',status:'review',scope:'공통 기준',riskType:'T04 뇌혈관질환보장 협소형',evidences:['EV003 뇌졸중 평균 입원 진료비 (심평원 2024)'],policies:1,conditions:3,updated:'2026-05-12'},
  {code:'RU003',name:'심혈관 보장 미흡',status:'draft',scope:'공통 기준',riskType:'T03 심혈관질환보장 협소형',evidences:[],policies:0,conditions:0,updated:'2026-05-08'},
  {code:'RU004',name:'노후 간병 보장 부재',status:'approved',scope:'공통 기준',riskType:'T05 노후돌봄보장 공백형',evidences:['EV005 65세 이상 간병보험 미가입률 (금감원 2024)'],policies:1,conditions:2,updated:'2026-05-15'},
  {code:'RU005',name:'보험료 납입 부담 과다',status:'paused',scope:'공통 기준',riskType:'T06 납입여력부족 우려형',evidences:[],policies:0,conditions:0,updated:'2026-05-16'},
  {code:'RU010',name:'단기납 만기 후 공백',status:'approved',scope:'공통 기준',riskType:'T09 단기납 만기 후 공백형',evidences:['EV005 65세 이상 간병보험 미가입률 (금감원 2024)'],policies:0,conditions:2,updated:'2026-05-15'},
  {code:'RU011',name:'고액 보험료 유지 부담',status:'paused',scope:'공통 기준',riskType:'T10 고액 보험료 유지 부담형',evidences:[],policies:0,conditions:0,updated:'2026-05-16'},
  {code:'RU006',name:'실손 중복 보장 기준 미흡',status:'rejected',scope:'공통 기준',riskType:'T07 실손중복보장 과잉형',evidences:[],policies:0,conditions:1,updated:'2026-05-18'},
];
const ST={active:'🟢 라이브',review:'⏳ 검수중',draft:'📝 임시저장',approved:'✔ 승인완료',paused:'⏸ 일시중지',rejected:'🚫 반려'};
let cur='all';
function filter(s,btn){cur=s;document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');render();}
function actionBtns(d) {
  const id = d.id || d.code;
  const editUrl = `07_card-editor-rule.html?id=${id}`;
  if (d.status === 'draft')    return `<a href="${editUrl}" class="btn btn-sm">편집</a> <button onclick="delCard('${id}')" class="btn btn-sm">삭제</button>`;
  if (d.status === 'review')   return `<button onclick="cancelReview('${id}')" class="btn btn-sm">요청취소</button>`;
  if (d.status === 'approved') return `<a href="00_canvas-main.html" class="btn btn-sm">캔버스에서 연결</a> <a href="${editUrl}" class="btn btn-sm">편집</a>`;
  if (d.status === 'active')   return `<button onclick="pauseCard('${id}')" class="btn btn-sm">일시중지</button> <a href="${editUrl}" class="btn btn-sm">편집</a>`;
  if (d.status === 'paused')   return `<button onclick="resumeCard('${id}')" class="btn btn-sm">재시작</button> <a href="${editUrl}" class="btn btn-sm">편집</a>`;
  if (d.status === 'rejected') return `<a href="${editUrl}" class="btn btn-sm">편집</a> <button onclick="delCard('${id}')" class="btn btn-sm">삭제</button>`;
  return `<a href="${editUrl}" class="btn btn-sm">편집</a>`;
}
function delCard(id){ alert('삭제: '+id); }
function cancelReview(id){ alert('요청취소: '+id); }
function pauseCard(id){ alert('일시중지: '+id); }
function resumeCard(id){ alert('재시작: '+id); }
function render(){
  const rows=cur==='all'?DATA:DATA.filter(d=>d.status===cur);
  const tb=document.getElementById('tbody');
  tb.innerHTML=rows.length?rows.map(d=>{
    const evChip = d.evidences.length > 0 ? `<span class="conn-chip chip-evidence">Evidence ${d.evidences.length}</span>` : `<span class="warn-tag"><i class="fa fa-triangle-exclamation"></i> Evidence 미연결</span>`;
    const polChip = d.policies > 0 ? `<span class="conn-chip chip-policy">Policy ${d.policies}</span>` : '';
    const evCell = evChip + (polChip ? ` ${polChip}` : '');
    return `
    <tr class="card-row" onclick="location.href='07_card-editor-rule.html?id=${d.id||d.code}'">
      <td><span class="badge badge-${d.status}">${ST[d.status]}</span></td>
      <td><div class="cell-code">${d.code}</div><div class="cell-name">${d.name} <span style="font-size:12px;color:var(--text-hint);font-weight:400">조건 ${d.conditions}개</span></div></td>
      <td><span class="badge badge-baseline">${d.scope}</span></td>
      <td><div style="white-space:nowrap;font-size:13px;color:var(--text-secondary)">${d.riskType}</div></td>
      <td>${evCell}</td>
      <td class="cell-date">${d.updated}</td>
      <td style="white-space:nowrap">${actionBtns(d)}</td>
    </tr>`;}).join('')
    :`<tr class="empty-row"><td colspan="7">해당 상태의 카드가 없습니다</td></tr>`;
  const cnt={all:DATA.length,active:0,review:0,draft:0,approved:0,paused:0,rejected:0};
  DATA.forEach(d=>cnt[d.status]++);
  ['all','active','review','draft','approved','paused','rejected'].forEach(k=>{const el=document.getElementById('c-'+k);if(el)el.textContent=cnt[k]});
}
render();
</script>
<script src="shared.js"></script>
</body>
</html>
