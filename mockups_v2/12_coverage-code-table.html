:root {
  --card-risk:#C94B1A; --card-evidence:#1A7A4A; --card-concept:#1A4A9A; --card-rule:#9A1A1A; --card-policy:#5A5A55;
  --card-playbook:#6B4A9A; --card-case:#D0CFC9;
  --status-draft:#9C9C94; --status-review:#BA7517; --status-active:#0F6E56; --status-approved:#1A4A9A; --status-paused:#7A4A00; --status-rejected:#A32D2D;
  --scope-public:#1A4A9A; --scope-baseline:#BA7517; --scope-internal:#5A5A55;
  --route-kc:#0F6E56; --route-gen:#6B6B65; --route-path:#1A3A6B;
  --step-done:#0F6E56; --step-active:#1A3A6B; --step-pending:#D0CFC9;
  --sidebar-w:220px; --bg-page:#F4F4F5; --bg-card:#FFFFFF;
  --text-primary:#171719; --text-secondary:#70737C; --text-hint:#989BA2;
  --border:#E1E2E4; --radius:8px; --shadow:0px 2px 4px -2px rgba(23,23,23,.06),0px 4px 6px -1px rgba(23,23,23,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-page);color:var(--text-primary);min-width:1280px;font-size:15px;line-height:1.5}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:#1A1A18;flex-shrink:0;padding:20px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:0 16px 20px;font-size:16px;font-weight:700;color:#fff;border-bottom:1px solid #333;margin-bottom:12px}
.sidebar a,.nav-locked{display:flex;align-items:center;gap:8px;padding:8px 16px;color:#C8C8C4;text-decoration:none;font-size:14px;transition:background .15s}
.sidebar a:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar a.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600;border-left:3px solid #5A8AE0}
.nav-divider{border-top:1px solid #333;margin:8px 0}
.nav-locked{color:#555!important;cursor:not-allowed}
.main{flex:1;padding:32px;overflow-y:auto}
.page-header{margin-bottom:28px}
.page-header h1{font-size:24px;font-weight:700;margin-bottom:6px}
.page-header p{color:var(--text-secondary)}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.section-title{font-size:17px;font-weight:700;margin:0 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:13px;font-weight:600;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--step-active);color:#fff}
.btn-secondary{background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border)}
.btn-sm{padding:5px 10px;font-size:13px}
.form-control{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;background:#fff;color:var(--text-primary)}
.form-control:focus{outline:none;border-color:var(--step-active);box-shadow:0 0 0 2px rgba(26,58,107,.12)}
.banner-info{background:#EEF4FF;border:1px solid #C0D0F0;color:#1A3A6B;padding:12px 16px;border-radius:var(--radius);margin-bottom:16px;font-size:14px;line-height:1.6}
.banner-warn{background:#FFF3D4;border:1px solid #F0C040;color:#8A5A00;padding:12px 16px;border-radius:var(--radius);margin-bottom:16px;font-size:14px;line-height:1.6}
.toast{position:fixed;bottom:24px;right:24px;background:#1A1A18;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--bg-page);border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;margin:2px;position:relative}
.chip:hover{background:var(--border)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:13px;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);background:#F8F8F6}
td{padding:10px 12px;font-size:14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#FAFAF8}
tr.clickable{cursor:pointer}

/* Source tabs */
.source-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px}
.source-tab{padding:10px 20px;font-size:15px;font-weight:600;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.source-tab:hover{color:var(--text-primary)}
.source-tab.active{color:var(--step-active);border-bottom-color:var(--step-active)}

/* Stats strip */
.stats-strip{display:flex;gap:20px;padding:10px 16px;background:#F8F8F6;border:1px solid var(--border);border-radius:6px;margin-bottom:16px;font-size:14px}
.stat-item{display:flex;align-items:center;gap:6px}
.stat-label{color:var(--text-secondary)}
.stat-val{font-weight:700}

/* Filter row */
.filter-row{display:flex;gap:12px;margin-bottom:16px;align-items:center}
.search-wrap{position:relative;flex:1}
.search-wrap input{padding-left:32px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-hint);font-size:14px}
.cat-select{width:180px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit}

/* Rule badge in table */
.rule-link{background:rgba(26,58,107,.1);color:var(--step-active);padding:2px 8px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}
.rule-link:hover{background:rgba(26,58,107,.2)}
.unused-badge{color:var(--text-hint);font-size:13px}

/* Type pill */
.type-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:700;background:#F0F0EE;color:var(--text-secondary)}

/* Detail row */
tr.detail-row td{background:#EEF4FF;padding:16px 20px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.detail-item label{font-size:12px;font-weight:700;color:var(--text-hint);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
.detail-item span{font-size:14px;color:var(--text-primary)}

/* Coverage code section */
.code-category{margin-bottom:20px}
.code-cat-title{font-size:14px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.chips-row{display:flex;flex-wrap:wrap;gap:4px}

/* Tooltip */
.tooltip-wrap{position:relative;display:inline-flex}
.tooltip-box{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1A1A18;color:#fff;padding:8px 12px;border-radius:6px;font-size:13px;white-space:nowrap;z-index:100;pointer-events:none;opacity:0;transition:opacity .15s;min-width:160px;text-align:center;line-height:1.5}
.tooltip-box.show{opacity:1}
.tooltip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1A1A18}
</style>
</head>

const FROMAGE_COND = {

function switchTab(source) {
  document.querySelectorAll('.source-tab').forEach(t => t.classList.toggle('active', t.dataset.source === source));
  document.getElementById('coverageSection').style.display = source === 'mydata' ? 'block' : 'none';
  document.getElementById('fromageSection').style.display = source === 'fromage' ? 'block' : 'none';
  document.getElementById('profileSection').style.display = source === 'profile' ? 'block' : 'none';
}

function renderCoverageCodes() {
  const total = Object.values(COVERAGE_CODES).reduce((s, v) => s + v.length, 0);
  const condNote = `
    <div class="banner-info" style="margin-bottom:20px">
      <i class="fa fa-sliders fa-fw"></i>
      <strong>담보코드별 Rule 조건 유형</strong>
      <div style="margin-top:10px;font-size:14px">
        <div style="display:flex;align-items:center;gap:8px">
          <i class="fa fa-circle-check fa-fw" style="color:var(--status-active);font-size:12px"></i>
          담보금액 <b>이상 (≥) · 이하 (≤)</b> — 담보 미보유 시 0원으로 처리
        </div>
      </div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid #C0D0F0;font-size:13px;color:var(--text-hint)">
        예) 암진단(A4200) 담보금 3,000만원 이하 → T02 암투병생활비 부족형
      </div>
      <div style="margin-top:8px;padding:8px 10px;background:rgba(15,110,86,.07);border-radius:6px;font-size:13px;color:#0F6E56">
        <i class="fa fa-user fa-fw"></i> <strong>프로파일 조건 연계:</strong> 동일 담보코드라도 <b>나이·성별·결혼여부·자녀유무</b> 프로파일 조건을 함께 설정하면 기준값을 세분화할 수 있습니다.
        예) "40세 이상 AND 암진단(A4200) 담보금 3천만원 이하" — <a href="07_card-editor-rule.html" style="color:#0F6E56">Rule 카드 편집기 →</a>
      </div>
    </div>
    <div style="font-size:13px;color:var(--text-hint);margin-bottom:12px">전체 ${total}개 담보코드</div>`;

  const cats = Object.entries(COVERAGE_CODES).map(([cat, codes]) => `
    <div class="code-category">
      <div class="code-cat-title">
        <i class="fa fa-tag" style="font-size:12px"></i> ${cat}
        <span style="font-weight:400;color:var(--text-hint)">(${codes.length}개)</span>
      </div>
      <div class="chips-row">
        ${codes.map(c => `
          <span class="chip" style="gap:6px;padding:4px 10px">
            <code style="font-size:12px;font-weight:700;color:var(--step-active);letter-spacing:.02em">${c.code}</code>
            <span style="font-size:13px;color:var(--text-secondary)">${c.desc}</span>
          </span>`).join('')}
      </div>
    </div>`).join('');

  document.getElementById('coverageCodes').innerHTML = condNote + cats;
}

function renderFromageSections() {
  const note = `
    <div class="banner-warn" style="margin-bottom:20px">
      <i class="fa fa-circle-exclamation fa-fw"></i>
      <strong>민감정보 처리 원칙 (§3-8)</strong> — 프롬에이지 데이터는 사용자 출력 시 <b>위험 / 주의 / 양호</b> 3단계 등급명만 허용.
      원본 수치(canr_ca 실수값 등) 직접 노출 금지. Rule 조건 빌더에서 프롬에이지를 소스로 선택하면 건강위험도 등급 조건을 설정할 수 있습니다 (위험/주의/양호). 원본 수치는 직접 노출하지 않습니다.
    </div>`;

  const cats = Object.entries(FROMAGE_SECTIONS).map(([cat, fields]) => {
    const cond = FROMAGE_COND[cat] || {};
    const condBanner = cond.text ? `
      <div style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:#F8F8F6;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;font-size:13px">
        <i class="fa ${cond.icon} fa-fw" style="color:${cond.color}"></i>
        <span>${cond.text}</span>
      </div>` : '';
    const chips = fields.map(f => {
      const isApiCode = /^[a-z_]+$/.test(f.code);
      return `<span class="chip" style="gap:6px;padding:4px 10px;border-color:rgba(107,74,154,.25)">
        <i class="fa fa-circle" style="font-size:6px;color:#6B4A9A"></i>
        <span style="font-size:13px;color:var(--text-primary)">${f.desc}</span>
        ${isApiCode ? `<code style="font-size:11px;color:var(--text-hint)">${f.code}</code>` : ''}
      </span>`;
    }).join('');
    return `
      <div class="code-category">
        <div class="code-cat-title">
          <i class="fa fa-dna" style="font-size:12px;color:#6B4A9A"></i> ${cat}
          <span style="font-weight:400;color:var(--text-hint)">(${fields.length}개)</span>
        </div>
        ${condBanner}
        <div class="chips-row">${chips}</div>
      </div>`;
  }).join('');

  document.getElementById('fromageCodes').innerHTML = note + cats;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

    return `<span style="font-size:12px;padding:2px 7px;border-radius:10px;background:rgba(15,110,86,.1);color:#0F6E56;font-weight:600">같음 · 포함됨 · 포함 안 됨</span>`;

            <span style="padding-top:3px;color:var(--text-hint)">AND</span>
            <span style="padding:3px 10px;border-radius:12px;background:rgba(26,74,154,.1);color:#1A4A9A;font-size:13px;font-weight:600;white-space:nowrap">📋 마이데이터</span>

            → T02 암투병생활비 부족형 판정
          </div>
        </div>

  document.getElementById('profileFields').innerHTML = note + table + sampleBox;
