<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Playbook 목록 — KC Admin</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.mvp-scope{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.scope-item{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;font-size:13px;font-weight:600}
.scope-on{background:#E8F4ED;border:1px solid #A0D0B8;color:#0A5A3C}
.scope-off{background:#F0F0EE;border:1px solid var(--border);color:var(--text-hint);text-decoration:line-through}
.filter-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.filter-tabs{display:flex;gap:4px}
.filter-tab{padding:6px 14px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-secondary);font-family:inherit}
.filter-tab.active{background:var(--step-active);color:#fff}
.filter-tab:hover:not(.active){background:#F0F0EC}
.list-table{width:100%;border-collapse:collapse;table-layout:fixed;background:var(--bg-card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.list-table th{background:#F0F0EC;padding:10px 16px;text-align:left;font-size:13px;font-weight:700;color:var(--text-secondary);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden}
.list-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
.list-table tr:last-child td{border-bottom:none}
.list-table tr.card-row:hover td{background:#FAFAF8;cursor:pointer}
.cell-code{font-size:12px;font-weight:700;color:var(--text-hint);margin-bottom:1px}
.cell-name{font-weight:600;overflow:hidden;white-space:nowrap}
.cell-date{color:var(--text-hint);font-size:13px;white-space:nowrap}
.count-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:12px;font-weight:600}
.chip-kw{background:rgba(107,74,154,.1);color:var(--card-playbook)}
.chip-rt{background:rgba(26,58,107,.1);color:var(--step-active)}
.empty-row td{text-align:center;padding:48px;color:var(--text-hint)}
.pb-tag{display:inline-block;padding:2px 7px;background:rgba(107,74,154,.1);border-radius:4px;font-size:12px;color:var(--card-playbook);font-weight:600}
</style>
</head>
<body>
<div class="layout">
<nav class="sidebar" id="sidebar"></nav>
<main class="main">
  <div class="page-header">
    <h1>⑥ Playbook 설정</h1>
    <p>Clark AI의 리드 전환 타이밍과 스코어링 기준을 설정합니다 · <a href="01_guide.html" style="color:var(--card-playbook);font-size:13px;text-decoration:none">업무 가이드 →</a></p>
  </div>

  <div class="guide-box">
    <strong>Playbook</strong>은 KC 체인과 병렬로 동작하는 독립 카드입니다. 발화 키워드를 감지하면 CTA 버튼(상담 연결·앱 이동·외부 링크)을 노출하고 GA에 리드 데이터를 전달합니다.
  </div>

  <div class="filter-bar">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filter('all',this)">전체 <span id="c-all"></span></button>
      <button class="filter-tab" onclick="filter('active',this)">🟢 라이브 <span id="c-active"></span></button>
      <button class="filter-tab" onclick="filter('approved',this)">✔ 승인완료 <span id="c-approved"></span></button>
      <button class="filter-tab" onclick="filter('review',this)">⏳ 승인요청 <span id="c-review"></span></button>
      <button class="filter-tab" onclick="filter('draft',this)">📝 임시저장 <span id="c-draft"></span></button>
      <button class="filter-tab" onclick="filter('paused',this)">⏸ 일시중지 <span id="c-paused"></span></button>
      <button class="filter-tab" onclick="filter('rejected',this)">🚫 반려 <span id="c-rejected"></span></button>
    </div>
    <a href="16_card-editor-playbook.html" class="btn btn-primary"><i class="fa fa-plus"></i> 신규 등록</a>
  </div>

  <table class="list-table">
    <thead>
      <tr>
        <th style="width:130px">상태</th>
        <th style="width:280px">명칭</th>
        <th style="width:100px">전환 키워드</th>
        <th style="width:140px">Risk-type 스코어</th>
        <th style="width:100px">수정일</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>
</div>
<script src="shared.js"></script>
<script>
renderSidebar();
const DATA = [
  {
    id:'PB001', name:'기본 리드 전환 설정', status:'active',
    kwCount:7, rtCount:10, updated:'2026-06-01'
  },
  {
    id:'PB002', name:'고령 고객 특화 전환 설정', status:'draft',
    kwCount:4, rtCount:3, updated:'2026-06-05'
  },
  {
    id:'PB003', name:'실손보험 갱신 안내 전환 설정', status:'rejected',
    kwCount:2, rtCount:5, updated:'2026-06-10'
  },
];
const ST={active:'🟢 라이브',review:'⏳ 승인요청',draft:'📝 임시저장',approved:'✔ 승인완료',paused:'⏸ 일시중지',rejected:'🚫 반려'};
let cur='all';
function filter(s,btn){
  cur=s;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const rows=cur==='all'?DATA:DATA.filter(d=>d.status===cur);
  const tb=document.getElementById('tbody');
  tb.innerHTML=rows.length?rows.map(d=>`
    <tr class="card-row" onclick="location.href='16_card-editor-playbook.html'">
      <td><span class="badge badge-${d.status}">${ST[d.status]}</span></td>
      <td>
        <div class="cell-code">${d.id}</div>
        <div class="cell-name" title="${d.name}">${d.name}</div>
      </td>
      <td><span class="count-chip chip-kw"><i class="fa-solid fa-comment-dots"></i> ${d.kwCount}개</span></td>
      <td><span class="count-chip chip-rt"><i class="fa-solid fa-circle-exclamation"></i> ${d.rtCount}개</span></td>
      <td class="cell-date">${d.updated}</td>
    </tr>`).join('')
    :`<tr class="empty-row"><td colspan="5">해당 상태의 Playbook이 없습니다</td></tr>`;
  const cnt={all:DATA.length,active:0,review:0,draft:0,approved:0,paused:0,rejected:0};
  DATA.forEach(d=>cnt[d.status]++);
  ['all','active','review','draft','approved','paused','rejected'].forEach(k=>{const el=document.getElementById('c-'+k);if(el)el.textContent=cnt[k]});
}
render();
</script>
</body>
</html>
